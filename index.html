<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>即時資金流向</title>
<style>
:root{--bg:#0a0e14;--panel:#0f1620;--panel2:#141d29;--line:#1e2a38;--fg:#e6edf3;--dim:#8b98a8;
  --up:#ff5a5a;--down:#3fd07f;--accent:#4aa8ff;--muted:#6b7888;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--fg);font-family:-apple-system,"Noto Sans TC",system-ui,sans-serif;font-size:14px}
header{position:sticky;top:0;z-index:5;background:var(--bg);border-bottom:1px solid var(--line);padding:8px 10px}
.titlerow{display:flex;align-items:center;gap:8px}
.brand{font-size:18px;font-weight:800}
.spacer{flex:1}
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--fg);border-radius:8px;
  padding:5px 10px;font-size:13px;cursor:pointer;white-space:nowrap}
.btn:active{background:#1c2836}
.btn.on{background:#1c3146;border-color:var(--accent)}
.tsline{font-size:11px;color:var(--dim);margin-top:3px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin:8px 0}
.mkrow{display:flex;flex-wrap:wrap;gap:6px 16px;align-items:baseline}
.mkrow b{font-size:17px}
.tabs{display:flex;gap:4px;margin-top:8px;overflow-x:auto}
.tab{padding:6px 12px;border:1px solid var(--line);border-bottom:none;background:var(--panel);
  color:var(--dim);border-radius:7px 7px 0 0;cursor:pointer;white-space:nowrap}
.tab.active{background:var(--panel2);color:var(--fg);font-weight:700}
.seg2{background:var(--panel2);border:1px solid var(--line);color:var(--dim);border-radius:7px;padding:4px 10px;font-size:12px;cursor:pointer}
.seg2.on{background:#1c3146;color:var(--fg);border-color:var(--accent)}
main{padding:8px 10px 30px}
.note{font-size:11px;color:var(--dim);margin:2px 0 6px}
.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:8px;-webkit-overflow-scrolling:touch}
.scrollbox{max-height:62vh}
table{border-collapse:collapse;width:100%;white-space:nowrap}
th,td{padding:6px 9px;text-align:right;border-bottom:1px solid var(--line);font-size:13px}
th{position:sticky;top:0;background:var(--panel2);color:var(--dim);font-weight:500;font-size:11px;cursor:pointer;user-select:none}
td.l,th.l{text-align:left;position:sticky;left:0;z-index:1;background:var(--bg);overflow:hidden;text-overflow:ellipsis}
.clk{cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px}
.wrap2 td.l{white-space:normal;overflow:visible;text-overflow:clip;line-height:1.25;word-break:break-all}
.nm{margin-left:4px}
.wrap2 td.l a{display:block}.wrap2 td.l .nm{display:block;font-size:11px;margin-left:0}
thead th.l{z-index:3;background:var(--panel2)}
tbody tr:nth-child(odd) td{background:#0c121a}
tbody tr:nth-child(odd) td.l{background:#0c121a}
tbody tr:active td{background:#16222f}
tbody tr.pin td{background:#16202c;font-weight:600;border-bottom:1px solid var(--accent)}
tbody tr.pin td.l{background:#16202c}
td.lu{background:var(--up)!important;color:#fff}
td.ld{background:var(--down)!important;color:#fff}
.up{color:var(--up)}.down{color:var(--down)}.mut{color:var(--muted)}
.db{background:#4a2430;color:#ff8f8f;border-radius:4px;padding:0 4px}
.sl{cursor:pointer;border-bottom:1px dotted currentColor}
.sl.sel{font-weight:700;border-bottom-style:solid}
.crumb{font-size:12px;color:var(--dim);margin:10px 0 4px}
.loading{color:var(--dim);padding:20px;text-align:center}
footer{color:var(--muted);font-size:11px;text-align:center;padding:14px}
/* 摘要分析（框架自 postmkt 搬入；:root 變數對照 v2：--card→--panel、--txt→--fg、--chip→--panel2、--muted→--dim） */
.insight-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin:10px 0;line-height:1.75;font-size:.92rem}
.slink{color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--accent)}
.insight-md h2{font-size:1.02rem;color:var(--accent);margin:16px 0 6px;font-weight:700}
.insight-md h2:first-child{margin-top:0}
.insight-md h3{font-size:.94rem;color:var(--fg);margin:12px 0 4px;font-weight:650}
.insight-md ul{margin:4px 0 8px;padding-left:20px}
.insight-md li{margin:3px 0}
.insight-md p{margin:6px 0}
.insight-md strong{color:var(--fg)}
.insight-md code{background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-family:Consolas,monospace;font-size:.86rem;color:var(--accent)}
.insight-md table{border-collapse:collapse;width:100%;margin:8px 0;font-size:.84rem}
.insight-md th,.insight-md td{border:1px solid var(--line);padding:5px 8px;text-align:left;white-space:normal}
.insight-md th{background:var(--panel2);color:var(--dim)}
.insight-note{color:var(--dim);font-size:.74rem;margin:8px 4px;line-height:1.6}
.insight-meta{color:var(--dim);font-size:.76rem;margin:2px 4px 10px}
/* 即時一覽 tab（第一期：儀表列/定調句/貢獻長條/強弱總表） */
.ovcards{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.ovcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px;flex:1;min-width:150px}
.ovcard .h{font-size:11px;color:var(--dim);margin-bottom:4px}
.ovcard .v{font-size:20px;font-weight:800}
.ovcard .sub{font-size:11px;color:var(--dim);margin-top:4px}
.ovbreadth{display:flex;height:10px;border-radius:4px;overflow:hidden;margin-top:6px;background:var(--line)}
.ovsent{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin:8px 0;font-size:13px;line-height:1.7}
.ovdiv{display:flex;align-items:center;gap:6px;margin:3px 0;font-size:12px}
.ovdiv .ovlbl{width:100px;flex:0 0 100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;padding-right:4px;color:var(--dim)}
.ovdiv .ovtrack{flex:1;position:relative;height:15px;background:linear-gradient(to right,transparent 49.3%,var(--line) 49.3%,var(--line) 50.7%,transparent 50.7%)}
.ovdiv .ovbarneg{position:absolute;right:50%;height:100%;background:var(--down);border-radius:3px 0 0 3px;opacity:.85}
.ovdiv .ovbarpos{position:absolute;left:50%;height:100%;background:var(--up);border-radius:0 3px 3px 0;opacity:.85}
.ovdiv .ovval{width:60px;flex:0 0 60px;font-size:11px}
/* 即時一覽 tab（第二期：資金地圖 treemap/30分動能/收盤定格） */
.ovphase{display:inline-block;font-size:11px;color:var(--dim);background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:2px 8px;margin-bottom:6px}
.ovsparkwrap{margin-top:4px;line-height:0}
.ovspark{display:block}
.ovtree{display:flex;margin:4px 0 2px;height:300px}
/* 欄寬/格高一律用百分比寫死（不用 flex-grow 分配）：flex item 對內容有隱性最小尺寸，
   會把小格撐大、擠壓大格，破壞「面積=佔比」；格線用 inset box-shadow（不佔幾何空間） */
.ovtcol{min-width:0;height:100%}
.ovtcell{position:relative;box-sizing:border-box;padding:2px 6px;cursor:pointer;overflow:hidden;box-shadow:inset 0 0 0 1px var(--bg);border-radius:3px;min-height:32px}
.ovtcell.novtclick{cursor:default}
/* 格內兩行（2026-07-21 使用者回饋）：第一行名稱、第二行「佔比% 漲跌%」；最小格墊高保底兩行不截斷 */
.ovtname{font-size:11.5px;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:14px}
.ovtmeta{font-size:11px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ovtbadge{position:absolute;top:5px;right:7px;font-size:12px;font-weight:800}
.ovt-uph{background:rgba(255,90,90,.88);color:#2a0808}
.ovt-upl{background:rgba(255,90,90,.32);color:var(--fg)}
.ovt-dnh{background:rgba(63,208,127,.88);color:#062412}
.ovt-dnl{background:rgba(63,208,127,.32);color:var(--fg)}
.ovt-flat{background:var(--panel2);color:var(--fg)}
.ovtfoot{font-size:11px;color:var(--dim);margin:2px 0 6px}
/* 象限圖可雙指縮放/平移容器（2026-07-21）：touch-action:none 交給自訂 pinch/pan，overflow 裁切放大溢出 */
.ovquad{position:relative}
.ovquadzoom{overflow:hidden;touch-action:none;cursor:grab;-webkit-user-select:none;user-select:none;border-radius:8px}
.ovquadzoom svg{will-change:transform}
.ovlastbadge{display:inline-block;border:1px solid var(--line);border-radius:8px;padding:0 6px;font-size:11px;color:var(--dim);background:var(--bg2,transparent)}
.ovmom{font-size:11px;font-weight:700}
/* 即時一覽 tab（第四期：盤中異動雷達＋自訂提醒） */
.ovradar{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0}
.ovradar>div{flex:1;min-width:250px}
.ovtoastwrap{position:fixed;right:12px;bottom:12px;z-index:60;display:flex;flex-direction:column;gap:8px;max-width:min(340px,86vw)}
.ovtoast{background:var(--panel2);border:1px solid var(--accent);border-radius:10px;padding:10px 14px;font-size:13px;line-height:1.5;box-shadow:0 6px 18px rgba(0,0,0,.55);animation:ovtoastin .25s ease}
@keyframes ovtoastin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* 即時一覽 tab（第五期：當日回放＋收盤總結） */
.ovphase.rp{color:var(--fg);border-color:var(--accent);font-weight:800;font-size:12px}
.ovreplaybar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px 12px;margin:8px 0;font-size:12px}
.ovreplaybar input[type=range]{flex:1;min-width:140px}
.ovsumgrid{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px}
.ovsumgrid>div{flex:1;min-width:200px}
/* 手機寬度：雷達三表改直向堆疊、各自全幅（表內欄位仍可 .tablewrap 橫向捲動）（2026-07-21） */
@media (max-width:560px){
  .ovradar{flex-direction:column;gap:10px}
  .ovradar>div{min-width:0;width:100%}
}
</style>
</head>
<body>
<header>
  <div class="titlerow">
    <span class="brand">即時資金流向</span>
    <span class="spacer"></span>
    <button class="btn" id="auto">⏱ 自動</button>
    <button class="btn" id="refresh">🔄 更新</button>
  </div>
  <div class="tsline" id="tsline">載入中…</div>
  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="ov">即時一覽</div>
    <div class="tab" data-tab="exchange">產業別</div>
    <div class="tab" data-tab="chain">產業鏈</div>
    <div class="tab" data-tab="rank">成交佔比</div>
    <div class="tab" data-tab="flow">資金湧入</div>
    <div class="tab" data-tab="outflow">資金退出</div>
    <div class="tab" data-tab="insight">摘要分析</div>
  </div>
</header>
<div class="card" id="mkcard" style="margin:8px 10px"></div>
<main id="main"><div class="loading">載入中…</div></main>
<footer>資料 FinMind tick_snapshot（盤中即時／盤後為當日最終）· 紅漲綠跌 · 個股連 Yahoo</footer>

<script>
// ======== 設定 ========
// V2：即時資料由 Cloudflare Worker 提供（FINMIND token 藏在 Worker，前端不碰、不需 PAT）。
// 部署 Worker 後把網址填入 CFG.worker（結尾不要斜線），例：
//   const CFG={worker:"https://taiwan-flow-v2.xxxx.workers.dev", autoSec:20};
// 留空時退化成讀靜態 data/live.json（只顯示最後一次快照，無即時）。
const CFG={worker:"https://taiwan-flow-v2.shihpc.workers.dev", autoSec:20};   // autoSec：自動刷新間隔（秒）
const isLocal=["localhost","127.0.0.1"].includes(location.hostname);
// 即時資料來源：有 Worker 走 Worker；本機開發走 /api/refresh（server.py 即時重算）；否則靜態檔
const liveURL=()=> CFG.worker ? CFG.worker+"/live?t="+Date.now()
                : isLocal ? "/api/refresh"
                : "data/live.json?t="+Date.now();

// 摘要分析可選模型（與 postmkt/news 三站共用 localStorage key：insight_model / anthropic_key）
const INSIGHT_MODELS=[["claude-opus-4-8","Opus 4.8（最佳判讀，約NT$3/次）"],["claude-sonnet-5","Sonnet 5（近Opus、約半價更快）"]];
const state={tab:"ov", idx:"tse", pool:null, live:null, cl:null, us:null, morning:null, aetf:null, sub:{ov:{open:null,view:"sub",expandAll:false,treeChain:null,treeSub:null,treeRest:false,treeUnc:null,treeUncRest:false,mapView:"tree",radarClosed:false}, exchange:{open:null}, chain:{open:null,opensub:null}, flow:{open:null}, outflow:{open:null}, aetf:{open:null,openEtf:null}},
  insight:null, insightLoading:false, insightErr:null,
  insightModel: localStorage.getItem("insight_model")||"claude-opus-4-8"};

// ---- formatters ----
const yi=v=>v==null?"—":v.toLocaleString("en-US",{minimumFractionDigits:1,maximumFractionDigits:1})+"億";
const num=v=>v==null?"—":Math.round(v).toLocaleString("en-US");
const pct=v=>v==null?"—":(v>0?"+":"")+v.toFixed(2)+"%";
const sgn=(v,t)=>`<span class="${v>0?'up':v<0?'down':'mut'}">${t}</span>`;
const yahoo=c=>`<a href="https://tw.stock.yahoo.com/quote/${c}" target="_blank" rel="noopener" style="color:var(--accent)">${c}</a>`;
const cleanSub=s=>(s||"").replace(/\s*[（(].*$/,"");  // 次產業顯示去掉括號內說明
const SC=["chg","amt","close","vol","bv","sv","pts","dp","lim","lw","f10","c10","c30","r10","it","fi","y1","y2","ints","nl","f30"]; // live.stocks 陣列欄位（後備）
const sval=(code)=>{const a=state.live.stocks[code]; if(!a)return null; const cols=(state.live&&state.live.stock_cols)||SC; const o={}; cols.forEach((k,i)=>o[k]=a[i]); return o;};

// ---- sortable table ----
const T={}; let TID=0;
const ctext=h=>{const d=document.createElement("div");d.innerHTML=h;return d.textContent.trim();};
const sv=t=>{if(t===""||t==="—")return null;const n=parseFloat(t.replace(/,/g,"").replace(/[^0-9.\-]/g,""));return isNaN(n)?t:n;};
function tbl(cols,rows,pin){const id="t"+(++TID);T[id]={cols,rows:[...rows],s:{i:null,d:1},pin:pin||null};return `<div class="tablewrap scrollbox" data-t="${id}">${tinner(id)}</div>`;}
function tinner(id){const{cols,rows,s,pin}=T[id];
  const w=c=>c.w?`width:${c.w}px;min-width:${c.w}px;max-width:${c.w}px`:'';
  const h=cols.map((c,i)=>`<th class="${c.cls||''}" style="${w(c)}" data-i="${i}">${c.h}${s.i===i?(s.d>0?" ▲":" ▼"):""}</th>`).join("");
  const tr=(r,cls)=>`<tr class="${cls||''}">`+cols.map(c=>`<td class="${c.cls||''} ${c.cf?c.cf(r):''}" style="${w(c)}">${c.f(r)}</td>`).join("")+"</tr>";
  return `<table><thead><tr>${h}</tr></thead><tbody>${pin?tr(pin,"pin"):""}${rows.map(r=>tr(r)).join("")}</tbody></table>`;}
document.addEventListener("click",e=>{const th=e.target.closest("th[data-i]");if(!th)return;
  const w=th.closest("[data-t]");if(!w)return;const o=T[w.dataset.t],i=+th.dataset.i;
  if(o.s.i===i)o.s.d*=-1;else{o.s.i=i;o.s.d=1;}const col=o.cols[i],d=o.s.d,val=r=>sv(ctext(col.f(r)));
  o.rows.sort((a,b)=>{const x=val(a),y=val(b);if(x===null)return 1;if(y===null)return -1;
    return typeof x==="number"&&typeof y==="number"?(x-y)*d:String(x).localeCompare(String(y),"zh-Hant")*d;});
  w.innerHTML=tinner(w.dataset.t);});

// ---- 點類股 / 次產業（delegated）----
document.addEventListener("click",e=>{const s=e.target.closest(".sl[data-sec]");if(!s)return;
  const v=decodeURIComponent(s.dataset.sec),cur=state.sub[state.tab].open;
  state.sub[state.tab].open=cur===v?null:v;state.sub[state.tab].opensub=null;render();});
document.addEventListener("click",e=>{const s=e.target.closest(".sl[data-sub]");if(!s)return;
  const v=decodeURIComponent(s.dataset.sub),cur=state.sub.chain.opensub;
  state.sub.chain.opensub=cur===v?null:v;render();});

// ---- render ----
function idxLine(label,d,mk,key){
  if(!d||d.val==null)return `<span>${label} <span class="mut">—</span></span>`;
  const v=d.val.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
  const P=(k,cls,t)=>`<span class="${cls} clk" data-pool="${key}:${k}">${t}</span>`;
  const cnt=mk?` <span class="mut">漲${P('up','up',mk.up)}(${P('ul','up',mk.up_lim||0)})/跌${P('down','down',mk.down)}(${P('dl','down',mk.down_lim||0)}) ${mk.n}檔</span>`:"";
  return `<span>${label} <b>${v}</b> ${sgn(d.chgP,(d.chgP>0?'+':'')+d.chgP.toFixed(2)+' ('+pct(d.chg)+')')} <span class="mut">量${yi(d.amt_yi)}</span>${cnt}</span>`;
}
function futuresVixLine(){
  const fu=state.live.futures, vix=state.live.vix;
  if(!fu&&vix==null)return "";
  const parts=[];
  if(fu){
    const b=fu.basis, word=b>0?"正價差":b<0?"逆價差":"價差平";
    parts.push(`期指(${(fu.contract||"").slice(4)}月) ${sgn(b,(b>0?"+":"")+b+" "+word)}`);
  }
  if(vix!=null){
    const cls=vix>=30?"down":vix>=20?"":"mut", tag=vix>=30?"（恐慌）":vix>=20?"（警戒）":"（平靜）";
    parts.push(`VIX恐慌指數 <span class="${cls}">${vix.toFixed(2)}${tag}</span>`);
  }
  return `<div class="mkrow mut" style="font-size:12px">${parts.join(" · ")}</div>`;
}
function renderMarket(){
  const ix=state.live.index||{}, m=state.live.market||{};
  document.getElementById("mkcard").innerHTML=
    `<div class="mkrow">${idxLine("加權",ix.tse,m.tse,"tse")}</div>`+
    `<div class="mkrow">${idxLine("櫃買",ix.otc,m.otc,"otc")}</div>`+
    futuresVixLine();
  const src=CFG.worker?" · 即時(Worker)":isLocal?"":" · 靜態快照";
  // 產生時間距今 >3 分鐘 → 標示資料偏舊（Worker/上游卡住時可察覺）
  let stale="";
  try{const age=(Date.now()-Date.parse(state.live.generated_at))/1000;
    if(age>180)stale=" · ⚠資料"+Math.round(age/60)+"分前";}catch(e){}
  document.getElementById("tsline").textContent="資料時間 "+(state.live.ts||"—")+src+(autoTimer?" · ⏱自動":"")+stale;
}
function idxSeg(){return `<div style="display:flex;gap:6px;margin:2px 0 8px;align-items:center"><span class="mut" style="font-size:11px">市場</span>`+
  `<button class="seg2 ${state.idx==='tse'?'on':''}" data-idx="tse">加權(TSE)</button>`+
  `<button class="seg2 ${state.idx==='otc'?'on':''}" data-idx="otc">櫃買(OTC)</button></div>`;}
// 成交佔比 tab：該市場全個股，預設依佔週變(佔比−上週佔)由大到小
function renderRank(){
  const want=state.idx==="tse"?"twse":"tpex", mn=state.idx==="tse"?"加權":"櫃買";
  const rows=Object.keys(state.live.stocks).filter(c=>(state.cl[c]||{}).t===want).map(mkStockRow).filter(Boolean)
    .filter(r=>r.amt_yi>0).sort((a,b)=>(shr(b)-lwShr(b))-(shr(a)-lwShr(a)));
  document.getElementById("main").innerHTML=
    `<div class="note">${mn}市場全個股（${rows.length}），預設依「佔週變」由大到小（點欄位標題可改排序）。</div>`+idxSeg()+tbl(stockCols(),rows);
}
// 佔比分母＝該市場(加權/櫃買)分類股總成交值：今日 amt_yi / 上週 lw_amt_yi
function mktTotal(){const m=state.live.market||{};return (m[state.idx]&&m[state.idx].amt_yi)||0;}
function mktLwTotal(){const m=state.live.market||{};return (m[state.idx]&&m[state.idx].lw_amt_yi)||0;}
const shr=r=>{const t=mktTotal();return t?r.amt_yi/t*100:0;};              // 佔比%
const lwShr=r=>{const t=mktLwTotal();return t?(r.lw_amt_yi||0)/t*100:0;};  // 上週佔%
const pctCell=(v,signed)=>signed?sgn(v,(v>0?"+":"")+v.toFixed(2)+"%"):v.toFixed(2)+"%";
// 三表共用欄寬（前7欄同序同寬；末2欄 類股/次產業＝漲/跌、檔；成分股＝漲跌額、最新價；再接 上週佔、上週均）
const W=[116,74,54,58,54,58,58,60,58,66,56,56];
const C_AMT={h:"成交值",w:W[1],f:r=>yi(r.amt_yi)};
const C_SHR={h:"佔比",w:W[2],f:r=>pctCell(shr(r))};
const C_SCHG={h:"佔週變",w:W[3],f:r=>pctCell(shr(r)-lwShr(r),1)};
const C_ASHR={h:"均佔",w:W[4],f:r=>pctCell(shr(r)/(r.n||1))};
const C_ACHG={h:"均週變",w:W[5],f:r=>pctCell(shr(r)/(r.n||1)-lwShr(r)/(r.n||1),1)};
const C_PTS={h:"貢獻點",w:W[6],f:r=>sgn(r.pts||0,((r.pts||0)>0?"+":"")+(r.pts||0).toFixed(1))};
const C_LWSHR={h:"上週佔",w:W[10],f:r=>pctCell(lwShr(r))};
const C_LWAVG={h:"上週均",w:W[11],f:r=>pctCell(lwShr(r)/(r.n||1))};
function aggCols(nameH){return[
  {h:nameH,cls:"l",w:W[0],f:r=>r.name}, C_AMT, C_SHR, C_SCHG, C_ASHR, C_ACHG, C_PTS,
  {h:"漲跌%",w:W[7],f:r=>sgn(r.avg_chg,pct(r.avg_chg))},

function stockCols(){return[

  {h:"漲跌%",w:W[7],f:r=>r.chgp==null?'<span class="mut">—</span>':sgn(r.chgp,pct(r.chgp))},
  {h:"漲跌額",w:W[8],f:r=>r.dp==null?'<span class="mut">—</span>':sgn(r.dp,(r.dp>0?"+":"")+r.dp.toFixed(2))},
  {h:"最新價",w:W[9],cf:r=>r.lim===1?'lu':r.lim===-1?'ld':'',f:r=>r.price==null?'<span class="mut">—</span>':r.price.toLocaleString("en-US")},
  C_LWSHR, C_LWAVG];}
function sumRow(a,label){return {name:`<b>${label} 合計</b>`,amt_yi:a.amt_yi,lw_amt_yi:a.lw_amt_yi,n:a.n,pts:a.pts,chgp:a.avg_chg,dp:null,price:null};}
function mkStockRow(c){const v=sval(c);if(!v)return null;const info=state.cl[c]||{};const a=v.amt/1e8;
  return {name:`${yahoo(c)}<span class="nm">${info.n||c}</span>`,amt_yi:a,lw_amt_yi:(v.lw||0)/1e8,n:1,pts:v.pts,chgp:v.chg,dp:v.dp,price:v.close,lim:v.lim};}
function stockRows(codes){

  return codes.filter(c=>(state.cl[c]||{}).t===want).map(mkStockRow).filter(Boolean).filter(r=>r.amt_yi>0).sort((x,y)=>y.amt_yi-x.amt_yi);}
// 點卡片數字 → 該條件個股池（同欄位、依成交值排序）
function renderPool(){
  const {mkt,kind}=state.pool, want=mkt==="tse"?"twse":"tpex";

  const codes=Object.keys(state.live.stocks).filter(c=>{const info=state.cl[c];if(!info||info.t!==want)return false;

// ---- 資金湧入 tab（回測依據 backtest/report_sector.md）----
// 次產業層有延續性（隔日資金黏性~8成、集中度越高越延續）＝主角；
// 個股層追高平均不利（T+3 負超額）＝觀察用，投信連買為唯一有實證旗標。
const FLOW_SUB_MIN_YI=0.5;    // 次產業近10分額下限（億）
const FLOW_STK_MIN=3e7;       // 個股近10分額下限（元）
const cxCell=v=>v==null?'<span class="mut">—</span>':`<span class="${v>=2?'up':v>=1.3?'':'mut'}">${v.toFixed(2)}×</span>`;
// dual=土洋同買（投信≥2且外資≥2，湧入訊號唯一翻正的疊加 +0.55%）→ 紅底標亮
const itCell=(v,dual)=>{const t=!v?'0':v+"日";
  return `<span class="${dual?'db':v>=2?'up':!v?'mut':''}">${t}</span>`;};
// 法人強度%（(投信+外資淨買額)/成交額；>5% 湧入加分、<-5% 退出更弱）
const intsCell=v=>{if(v==null)return '<span class="mut">—</span>';
  const b=Math.abs(v)>=5;const t=(v>0?"+":"")+v.toFixed(1)+"%";
  return `<span class="${v>0?'up':v<0?'down':'mut'}">${b?`<b>${t}</b>`:t}</span>`;};
// 昨日/前日日線訊號標註（回測 report_lag.md：次產業昨湧→今日續強；個股昨湧→偏弱、昨退→續弱；連續兩日效果加倍）
const annCell=(y1,y2)=>{
  if(y1===1&&y2===1)return '<b class="up">連湧</b>';
  if(y1===1)return '<span class="up">昨湧</span>';
  if(y1===-1&&y2===-1)return '<b class="down">連退</b>';
  if(y1===-1)return '<span class="down">昨退</span>';
  if(y2===1)return '<span class="mut">前湧</span>';
  if(y2===-1)return '<span class="mut">前退</span>';
  return '<span class="mut">—</span>';};
// 案四（2026-07-19）：盤外用 flow_last.stocks[code]（[f10,c10,c30,r10]）覆寫短窗四欄，
// 由 renderFlow 在渲染前設定 FLOW_STK_SRC（null=即時，走 sval(c) 原欄位）。
// it/fi/y1/y2/ints/nl/chgp/price/lim 這些永遠從 sval(c) 取（baseline 直出，不受 flow 是否
// 定格影響，兩種來源下都一樣即時），只有短窗四欄換血。
let FLOW_STK_SRC=null;
function flowStockRow(c){const v=sval(c);if(!v)return null;const info=state.cl[c]||{};
  let f10,c10,c30,r10;
  if(FLOW_STK_SRC){const s=FLOW_STK_SRC[c];if(!s)return null;[f10,c10,c30,r10]=s;}
  else{if(v.f10==null)return null;f10=v.f10;c10=v.c10;c30=v.c30;r10=v.r10;}
  return {name:`${yahoo(c)}<span class="nm">${info.n||c}</span>`,f10,c10,c30,r10,
    chgp:v.chg,price:v.close,lim:v.lim,it:v.it,fi:v.fi,y1:v.y1,y2:v.y2,ints:v.ints,nl:v.nl};}
// 各次產業總成員數（分母，讓「檔」有參與率意義；由 classify 現算、快取一次）
// 只計上市/上櫃（與湧入統計的分子同一母體；興櫃不在 baseline，不能進分母）
let SUBN=null;
function subTotal(name){
  if(!SUBN){SUBN={};for(const c in state.cl){const t=state.cl[c].t;
    if(t!=="twse"&&t!=="tpex")continue;
    for(const p of (state.cl[c].p||[]))SUBN[p[1]]=(SUBN[p[1]]||0)+1;}}
  return SUBN[name]||0;}
function flowStockCols(out){const cols=[
  {h:"個股",cls:"l",w:W[0],f:r=>r.name},

  {h:"漲跌%",w:W[7],f:r=>r.chgp==null?'<span class="mut">—</span>':sgn(r.chgp,pct(r.chgp))},
  {h:"最新價",w:W[9],cf:r=>r.lim===1?'lu':r.lim===-1?'ld':'',f:r=>r.price==null?'<span class="mut">—</span>':r.price.toLocaleString("en-US")},
  {h:"法人強度",w:66,f:r=>intsCell(r.ints)},

// 案四（2026-07-19）：flow_last 是否可用於 renderFlow 定格 fallback——

// 湧入/退出共用：同一套集中度，依「窗內方向」拆分（漲=買盤湧入、跌=賣壓退出）
function renderFlow(){
  const out=state.tab==="outflow", word=out?"退出":"湧入";
  const liveFlow=state.live.flow, last=flowLastUsable();
  const fl=liveFlow||last, usingLast=!liveFlow&&!!last;
  FLOW_STK_SRC=usingLast?(last.stocks||{}):null;
  const main=document.getElementById("main");
  let html=out
    ?`<div class="note">資金<b>退出</b>＝短窗集中度高且<b>窗內下跌</b>（賣壓集中湧出）。`+
     `回測：<b>個股</b>爆量下殺有<span class="down">續弱傾向</span>（T+3輸大盤63% vs 對照58%，跌停鎖死更強）；`+

    :`<div class="note">短窗<b>資金集中度</b>＝近N分佔全市場成交比 ÷ 5日常態佔比。`+
     `回測：<b>次產業</b>湧入有延續性（隔日資金黏性約8成）；<b>個股</b>追高平均不利，`+

     `「法人強度」＝法人淨買額佔成交額，<span class="up">≥+5%</span>湧入股不再追高吃虧；`+
     `<span class="db">土洋同買</span>（投信外資皆≥2日，紅底）為湧入唯一翻正組合(+0.55%)。</div>`;
  if(!fl){
    // flow=null 且 flow_last 也不可用（首次部署後尚未定格 / 舊格式無 subs / 回放模式）——
    // 兩種截然不同的原因：盤前正常累積中 vs Worker 端出錯（baseline 抓不到、frame cron 沒寫 KV…）。
    // 後者藏在 live.flow_err，不顯示的話壞了很難發現——一併亮出來（不得被 fallback 邏輯蓋掉）。
    const err=state.live&&state.live.flow_err;
    main.innerHTML=html+`<div class="loading">盤中每分鐘累積後生效（約 09:10 起）。目前無盤中序列資料。`+
      (err?`<br><span class="down">流向計算失敗（flow_err）：${escI(String(err))}</span><br>`+
        `<span class="mut">非盤前時段看到此訊息＝Worker 端異常（baseline / KV frame cron），請檢查部署。</span>`:"")+
      `</div>`;
    return;
  }
  // 案四：使用收盤定格資料時的徽章（同案三象限圖徽號樣式），標註資料日
  if(usingLast)html+=`<div class="note"><span class="ovlastbadge">資金動向：${escI(String(fl.date||"").slice(5))} 收盤定格</span></div>`;

      `盤中每分鐘寫入後會自動補齊，稍後再查看。</div>`;

  }
  const dirSub=s=>out?(s.ret!=null&&s.ret<0):(s.ret==null||s.ret>=0);

  const subs=(fl.subs||[]).filter(s=>s.d_yi>=FLOW_SUB_MIN_YI).filter(dirSub).map(s=>({...s,raw:s.name,
    name:`<span class="sl ${openState.open===s.name?'sel':''}" data-fsub="${encodeURIComponent(s.name)}">${cleanSub(s.name)}</span>`}))
    .sort((a,b)=>(b.c1||0)-(a.c1||0));
  html+=`<div class="crumb"><b>次產業${word}排行</b>（近10分額≥${FLOW_SUB_MIN_YI}億，依集中度）</div>`;
  html+=tbl([
    {h:"次產業",cls:"l",w:W[0],f:r=>r.name},
    {h:"近10分",w:70,f:r=>yi(r.d_yi)},
    {h:"集中10分",w:70,f:r=>cxCell(r.c1)},
    {h:"集中30分",w:70,f:r=>cxCell(r.c2)},
    {h:"窗內漲跌",w:70,f:r=>r.ret==null?'<span class="mut">—</span>':sgn(r.ret,(r.ret>0?"+":"")+r.ret.toFixed(2)+"%")},
    {h:"前日訊號",w:64,f:r=>annCell(r.y?r.y[0]:0,r.y?r.y[1]:0)},
    {h:"參與/全",w:58,f:r=>{const t=subTotal(r.raw);const hot=t&&r.n/t>=0.7;
      return `<span class="${hot?'up':''}">${r.n}/${t||"?"}</span>`;}}],subs);
  const open=openState.open;
  if(open){
    const codes=Object.keys(state.cl).filter(c=>(state.cl[c].p||[]).some(p=>p[1]===open));
    const rows=codes.map(flowStockRow).filter(Boolean).filter(r=>r.f10>0).sort((a,b)=>b.f10-a.f10);
    html+=`<div id="dd"><div class="crumb"><b>${cleanSub(open)}</b> 成分股（${rows.length}，依近10分額，再點收合）</div>`+tbl(flowStockCols(out),rows)+`</div>`;

}

// ---- 資料時間呈現：agoTxt=相對/絕對時間、metaLine=區塊層級的小字更新列 ----
function agoTxt(iso){
  const t=Date.parse(iso);if(!t)return "";
  const d=new Date(t),now=new Date(),mins=(now-t)/6e4;
  const hm=("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2);
  if(mins<60)return Math.max(1,Math.round(mins))+"分前";
  if(d.toDateString()===now.toDateString())return "今天 "+hm;
  return (d.getMonth()+1)+"-"+d.getDate()+" "+hm;
}
function metaLine(txt,warn){return `<div class="note mut" style="font-size:11px">${txt}${warn?` <span class="down">${warn}</span>`:""}</div>`;}
const isWeekday=()=>[1,2,3,4,5].includes(new Date().getDay());

const uswList=()=>{try{return JSON.parse(localStorage.getItem("tflive2_uswatch")||"[]");}catch(e){return [];}};
const uswSave=l=>localStorage.setItem("tflive2_uswatch",JSON.stringify(l));

let uswCache=null;   // {key, rows}
let uswPulled=false; // 本次瀏覽已從遠端拉過
async function uswRemotePull(){
  if(!CFG.worker||!uswSyncCode()||uswPulled)return;
  try{const j=await loadJSON(CFG.worker+"/usersync?k="+encodeURIComponent(uswSyncCode()));

function bindUsWatch(){
  const btn=document.getElementById("uswAdd"), inp=document.getElementById("uswIn");
  if(!btn)return;
  const add=()=>{const v=(inp.value||"").trim().toUpperCase();
    if(!/^[A-Z0-9^.\-]{1,8}$/.test(v)){alert("代號格式不對");return;}
    const l=uswList();
    if(l.includes(v))return;
    if(l.length>=12){alert("自選上限 12 檔");return;}
    l.push(v);uswSave(l);uswRemotePush();uswCache=null;inp.value="";
    if(state.tab==="us")render();};
  btn.onclick=add;
  inp.onkeydown=e=>{if(e.key==="Enter")add();};
  const en=document.getElementById("uswSyncEn");
  if(en)en.onclick=async()=>{
    const v=(document.getElementById("uswSyncIn").value||"").trim();
    if(v.length<4){alert("同步碼至少 4 個字");return;}
    if(!CFG.worker){alert("同步需要 Worker");return;}
    localStorage.setItem("tflive2_usw_sync",v);
    try{const j=await loadJSON(CFG.worker+"/usersync?k="+encodeURIComponent(v));
      if(j&&Array.isArray(j.list)&&j.list.length)uswSave(j.list);   // 遠端已有 → 用遠端
      else uswRemotePush();                                          // 遠端空 → 推本機
    }catch(e){alert("同步啟用失敗："+(e.message||e));}
    uswPulled=true;uswCache=null;render();};
  const off=document.getElementById("uswSyncOff");
  if(off)off.onclick=()=>{localStorage.removeItem("tflive2_usw_sync");uswPulled=false;render();};
}

function aetfAdvice(diff){
  const L=[];
  const st=diff.stocks||[], sb=diff.subs||[];
  const co=st.filter(s=>Object.values(s.by||{}).filter(v=>v>0).length>=2).slice(0,3);
  if(co.length)L.push(`<b class="up">多檔同買</b>：${co.map(s=>s.n||s.c).join("、")}`);
  const cs=st.filter(s=>Object.values(s.by||{}).filter(v=>v<0).length>=2).slice(0,2);
  if(cs.length)L.push(`<b class="down">多檔同賣</b>：${cs.map(s=>s.n||s.c).join("、")}`);
  const inn=sb.filter(s=>s.val>0)[0], out=sb.filter(s=>s.val<0)[0];
  if(inn)L.push(`次產業最大加碼：<span class="up">${cleanSub(inn.name)} +${(inn.val/1e8).toFixed(1)}億</span>`);
  if(out)L.push(`最大減碼：<span class="down">${cleanSub(out.name)} ${(out.val/1e8).toFixed(1)}億</span>`);
  for(const [k,v] of Object.entries(diff.etfs||{})){
    if(v.est_flow&&Math.abs(v.est_flow)>=10e8)L.push(`${k} 淨${v.est_flow>0?"申購":"贖回"}約 ${(Math.abs(v.est_flow)/1e8).toFixed(0)}億`);
  }

    const hot=new Set((state.live.flow.subs||[]).filter(s=>(s.c1||0)>=1.5&&(s.ret==null||s.ret>=0)).map(s=>s.name));

// key 只存本機 localStorage，只隨查詢送給 Anthropic，不進 repo、不傳第三方。
const anthKey = () => localStorage.getItem("anthropic_key") || "";
// 台灣時間 "YYYY-MM-DD HH:MM:SS"（sv-SE locale 給 ISO 樣式，指定 Asia/Taipei 時區）
const twNow = () => new Date().toLocaleString("sv-SE", { timeZone:"Asia/Taipei" });
// HTML escape（postmkt 有全域 esc，v2 無同名工具 → 內聯同等實作）
const escI = s => String(s==null?"":s).replace(/[&<>"']/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
// ---------- 雲端儲存共用（GitHub Contents API；三站逐字相同：postmkt /
// taiwan-flow-live-v2 / taiwan-stock-news，修改請三站同步）----------
// PAT 只存本機 localStorage（gh_token），只隨請求送給 GitHub API 本身，不進 repo、不傳第三方。
const ghToken = () => localStorage.getItem("gh_token") || "";
// 台北日 YYYYMMDD（檔名用）
const twDay8 = () => twNow().slice(0, 10).replace(/-/g, "");
// base64 ⇄ UTF-8：btoa/atob 只吃 Latin-1，中文要先過 TextEncoder/TextDecoder
const b64EncodeUtf8 = s => { const b = new TextEncoder().encode(s); let r = ""; for (let i = 0; i < b.length; i += 0x8000) r += String.fromCharCode.apply(null, b.subarray(i, i + 0x8000)); return btoa(r); };
const b64DecodeUtf8 = s => { const bin = atob(String(s || "").replace(/\s+/g, "")); const b = new Uint8Array(bin.length); for (let i = 0; i < bin.length; i++) b[i] = bin.charCodeAt(i); return new TextDecoder().decode(b); };
// 分析結果存 GitHub（shihpc/postmkt main 的 data/analyses/{fileName}）：
// GET 現檔（404=新檔）→ 解出當日陣列 → push entry → 超過 10 筆丟最舊 → PUT（帶 sha 防蓋寫）。
// 409/422（寫入衝突）→ 重新 GET 再試一次。回傳 {ok, err}；呼叫端自行決定怎麼呈現。
async function ghSaveAnalysis(fileName, entry){
  const token = ghToken();
  if (!token) return { ok: false, err: "未設定 GitHub token" };
  const api = "https://api.github.com/repos/shihpc/postmkt/contents/data/analyses/" + fileName;
  const headers = { "Authorization": "Bearer " + token, "Accept": "application/vnd.github+json" };
  const attempt = async () => {
    let sha = null, arr = [];
    const g = await fetch(api + "?ref=main", { headers });
    if (g.status === 200){
      const j = await g.json();
      sha = j.sha || null;
      try { const cur = JSON.parse(b64DecodeUtf8(j.content || "")); if (Array.isArray(cur)) arr = cur; } catch (e) {}
    } else if (g.status !== 404){
      throw new Error("讀取現檔失敗 HTTP " + g.status);
    }
    arr.push(entry);
    while (arr.length > 10) arr.shift();
    const body = { message: "analysis: " + fileName.replace(/-\d{8}\.json$/, "") + " " + String(entry.at || "").slice(0, 16),
      content: b64EncodeUtf8(JSON.stringify(arr)), branch: "main" };
    if (sha) body.sha = sha;
    const p = await fetch(api, { method: "PUT", headers, body: JSON.stringify(body) });
    if (p.status === 409 || p.status === 422) return { conflict: true };
    if (!p.ok){ const j = await p.json().catch(() => ({})); throw new Error("PUT HTTP " + p.status + (j.message ? "：" + j.message : "")); }
    return { conflict: false };
  };
  try {
    let r = await attempt();
    if (r.conflict) r = await attempt();
    if (r.conflict) throw new Error("寫入衝突（重試一次仍失敗）");
    return { ok: true, err: null };
  } catch (e) {
    return { ok: false, err: String(e.message || e) };
  }
}

// 極簡 markdown→HTML（LLM 輸出用）：標題/清單/粗體/行內碼/表格/段落。夠用即可，不引入外部庫。
function mdToHtml(md){
  const esc2 = s => s.replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  const inline = s => esc2(s).replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
    .replace(/`([^`]+)`/g,"<code>$1</code>");
  const lines = String(md||"").split("\n");
  let html = "", i = 0;
  while (i < lines.length){
    const ln = lines[i];
    if (/^\s*\|.*\|\s*$/.test(ln) && i+1<lines.length && /^\s*\|[\s:|-]+\|\s*$/.test(lines[i+1])){
      const cell = r => r.replace(/^\s*\|/,"").replace(/\|\s*$/,"").split("|").map(c=>c.trim());
      const head = cell(ln); i += 2;
      let body = "";
      while (i < lines.length && /^\s*\|.*\|\s*$/.test(lines[i])){ body += "<tr>"+cell(lines[i]).map(c=>`<td>${inline(c)}</td>`).join("")+"</tr>"; i++; }
      html += `<table><thead><tr>${head.map(c=>`<th>${inline(c)}</th>`).join("")}</tr></thead><tbody>${body}</tbody></table>`;
      continue;
    }
    let m;
    if ((m = ln.match(/^##\s+(.*)/))) html += `<h2>${inline(m[1])}</h2>`;
    else if ((m = ln.match(/^###\s+(.*)/))) html += `<h3>${inline(m[1])}</h3>`;
    else if (/^\s*[-*]\s+/.test(ln)){
      let items = "";
      while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])){ items += `<li>${inline(lines[i].replace(/^\s*[-*]\s+/,""))}</li>`; i++; }
      html += `<ul>${items}</ul>`; continue;
    }
    else if (ln.trim()==="") { /* skip */ }
    else html += `<p>${inline(ln)}</p>`;
    i++;
  }
  return html;
}
// 個股代號→Yahoo 技術分析連結（三站逐字相同：postmkt / taiwan-flow-live-v2 /
// taiwan-stock-news，修改請三站同步）。在 mdToHtml 輸出後呼叫；用 tag 切分法只處理
// 標籤外的文字片段，不破壞既有 HTML、也天然不會重包已在 <a> 內的文字。
// 防誤連雙層：①候選 ∈ knownSet（頁面記憶體已知代號）②兜底＝代號後緊跟中文股名
// （首字不在單位黑名單）。緊鄰英數/小數點、或後接 -、/（日期 2026-07-11）皆不連。
function linkifyStocks(html, knownSet){
  const BLACK = "年月日時分點張口億萬元筆家檔次倍天週股"; // 單位/時間字：後接這些多半不是股名
  const CJK = ch => !!ch && /[一-鿿]/.test(ch);
  const link = c => `<a href="https://tw.stock.yahoo.com/quote/${c}/technical-analysis" target="_blank" rel="noopener" class="slink">${c}</a>`;
  return String(html||"").split(/(<[^>]*>)/).map(seg => {
    if (seg.charAt(0) === "<") return seg;
    return seg.replace(/(00[0-9]{3,4}[A-Z]?|[0-9]{4}[A-Z]?)/g, (m, _g, off) => {
      const prev = seg.charAt(off-1), next = seg.charAt(off+m.length);
      const n2 = seg.charAt(off+m.length+1), n3 = seg.charAt(off+m.length+2);
      if (/[0-9A-Za-z.]/.test(prev) || /[0-9.\-\/]/.test(next)) return m;
      if (CJK(next)){
        // 兜底：後緊跟中文股名。首字在黑名單→不連（含集合內代號，防「2026年」誤連）；
        // 「元」例外：元+中文次字視為元大/元太等股名，但「元大關」（千元大關）除外。
        const ok = next === "元" ? (CJK(n2) && !(n2 === "大" && n3 === "關"))
                                 : !BLACK.includes(next);
        return ok ? link(m) : m;
      }
      return (knownSet && knownSet.has(m)) ? link(m) : m;
    });
  }).join("");
}

// 從 state.live 彙整成給 LLM 的精簡文字（不 dump 全量，只取關鍵訊號欄位）。
// 日期對齊機制照 postmkt：primary=主資料日、各段用 dlabel 標注自己的資料日，
// 不同日的段落標警告避免跨日直接比較。回傳 {text, primary, dates}。
function insightGatherContext(){
  const live = state.live;
  if(!live) return { text:"", primary:"", dates:{} };
  const parts = [];
  // 主資料日：ts 內含日期就用 ts，否則由 generated_at 換算台灣日期
  const tsm = String(live.ts||"").match(/\d{4}[-\/]\d{2}[-\/]\d{2}/);
  const primary = tsm ? tsm[0].replace(/\//g,"-")
    : (live.generated_at ? new Date(live.generated_at).toLocaleDateString("sv-SE",{timeZone:"Asia/Taipei"}) : "");
  const dates = {};
  const norm = s => String(s||"").replace(/\//g,"-");
  const dlabel = (name, secDate) => {
    dates[name] = secDate || "?";
    if (!secDate) return `【${name}（資料日不明）】`;
    if (norm(secDate) === norm(primary)) return `【${name}（資料日 ${secDate}）】`;
    return `【${name}（⚠資料日 ${secDate}，與主資料日 ${primary} 不同，請勿與其他段落跨日直接比較）】`;
  };
  const f1 = v => v==null ? "—" : v.toFixed(1);
  const f2s = v => v==null ? "—" : (v>0?"+":"")+v.toFixed(2);
  // a. 大盤：加權/櫃買指數 ＋ 漲跌家數/成交值
  {
    const ix = live.index||{}, mk = live.market||{};
    const one = (label, d, m) => {
      const l = [];
      // chgP=漲跌點數、chg=漲跌%（worker idxOut 定義），兩者都給模型
      if (d && d.val!=null) l.push(`${label}指數 ${d.val.toFixed(2)}（${f2s(d.chgP)}點/${f2s(d.chg)}%）成交${f1(d.amt_yi)}億`);
      if (m) l.push(`漲${m.up??"—"}(漲停${m.up_lim||0})/跌${m.down??"—"}(跌停${m.down_lim||0})/平${m.flat??"—"}${m.amt_yi!=null?` 分類股總額${f1(m.amt_yi)}億`:""}`);
      return l.join("，");
    };
    const a = one("加權", ix.tse, mk.tse), b = one("櫃買", ix.otc, mk.otc);
    if (a||b) parts.push(`${dlabel("大盤即時", primary)}\n${[a,b].filter(Boolean).join("\n")}`);
  }
  // b. 產業別資金：exchange 依 tse.amt_yi 前8強＋依平均漲跌跌勢前5
  {
    const ex = (live.exchange||[]).map(s=>({sector:s.sector, ...(s.tse||{})})).filter(r=>(r.n||0)>0);
    if (ex.length){
      const line = r => `${r.sector} 成交${f1(r.amt_yi)}億 平均${f2s(r.avg_chg)}% 貢獻${f2s(r.pts)}點 漲${r.up}/跌${r.down}(${r.n}檔)`;
      const top = [...ex].sort((a,b)=>(b.amt_yi||0)-(a.amt_yi||0)).slice(0,8);
      const weak = [...ex].filter(r=>(r.avg_chg||0)<0).sort((a,b)=>(a.avg_chg||0)-(b.avg_chg||0)).slice(0,5);
      const seg = [`資金前8強：\n${top.map(line).join("\n")}`];
      if (weak.length) seg.push(`跌勢前5：\n${weak.map(line).join("\n")}`);
      parts.push(`${dlabel("產業別資金（加權市場）", primary)}\n${seg.join("\n")}`);
    }
  }
  // c. 資金湧入：flow.subs 依集中10分(c1) 前12；盤前 flow=null 明確註明
  {
    const fl = live.flow;
    if (!fl || !(fl.subs||[]).length){
      parts.push(`${dlabel("次產業盤中資金集中", primary)}\n盤前，無盤中資金集中資料。`);
    } else {
      const subs = [...fl.subs].sort((a,b)=>((b.c1!=null?b.c1:(b.d_yi||0))-(a.c1!=null?a.c1:(a.d_yi||0)))).slice(0,12);
      const line = s => `${cleanSub(s.name)} 近10分${f1(s.d_yi)}億 集中10分${s.c1==null?"—":s.c1.toFixed(2)}× 集中30分${s.c2==null?"—":s.c2.toFixed(2)}× 窗內${f2s(s.ret)}%`;
      parts.push(`${dlabel("次產業盤中資金集中（依集中10分倍數）", primary)}\n${subs.map(line).join("\n")}`);
    }
  }
  // d. 個股資金集中：sval 解碼，篩有盤中欄位(c10) 者，依 c10 前15；無盤中欄位則整段略過
  {
    const rows = Object.keys(live.stocks||{}).map(c=>{const v=sval(c); return v&&v.c10!=null?{c,...v}:null;})
      .filter(Boolean).sort((a,b)=>((b.c10!=null?b.c10:(b.c30||0))-(a.c10!=null?a.c10:(a.c30||0)))).slice(0,15);
    if (rows.length){
      const line = r => {
        const nm = (state.cl && state.cl[r.c] && state.cl[r.c].n) || "";
        return `${r.c}${nm} 集中10分${r.c10==null?"—":r.c10.toFixed(2)}×/30分${r.c30==null?"—":r.c30.toFixed(2)}× 漲跌${f2s(r.chg)}% 量${r.vol==null?"—":Math.round(r.vol)}張 投信連買${r.it||0}日/外資連買${r.fi||0}日 法人強度${r.ints==null?"—":f2s(r.ints)}%`;
      };
      parts.push(`${dlabel("個股盤中資金集中 前15（依集中10分倍數）", primary)}\n${rows.map(line).join("\n")}`);
    }
  }
  // e. 即時一覽快照（第三期 additive）：重用 ovComputeSubAgg 的次產業聚合，只讀即時欄位
  //    （amt/pts/f30/chg/up/down/n 與 index.chgP、market 漲跌家數），不碰 c1/c2/y/it/fi/y1/y2/ints/nl/lw。
  //    此段加在既有語境之後，失敗時靜默略過、不影響前面段落。
  if (state.cl && live.stocks){
    try{
      const agg = Object.values(ovComputeSubAgg());
      if (agg.length){
        const seg = [];
        const fmt = s => `${cleanSub(s.name)} ${(s.pts>0?"+":"")+s.pts.toFixed(1)}點`;
        const lift = [...agg].filter(s=>s.pts>0).sort((a,b)=>b.pts-a.pts).slice(0,5);
        const drag = [...agg].filter(s=>s.pts<0).sort((a,b)=>a.pts-b.pts).slice(0,3);
        if (lift.length) seg.push(`貢獻拉抬前5（次產業）：${lift.map(fmt).join("、")}`);
        if (drag.length) seg.push(`貢獻拖累前3（次產業）：${drag.map(fmt).join("、")}`);
        const ix = (live.index&&live.index.tse)||{};
        if (ix.chgP){
          const top5 = Object.keys(live.stocks).filter(c=>(state.cl[c]||{}).t==="twse")
            .map(c=>Math.abs((sval(c)||{}).pts||0)).sort((a,b)=>b-a).slice(0,5).reduce((a,b)=>a+b,0);
          seg.push(`貢獻集中度：|貢獻點|前5個股合計 ${top5.toFixed(1)} 點，佔指數漲跌 ${(top5/Math.abs(ix.chgP)*100).toFixed(0)}%`);
        }
        const mkt30 = live.flow && live.flow.mkt && live.flow.mkt.d30_yi;
        const mktAmt = (live.market&&live.market.tse&&live.market.tse.amt_yi)||0;
        if (mkt30 && mktAmt){
          const rising = agg.map(s=>{
            const fullDay=(s.amt/1e8)/mktAmt*100, now30=(s.f30/1e8)/mkt30*100;
            return {name:s.name, fullDay, now30, diff:now30-fullDay};
          }).sort((a,b)=>b.diff-a.diff).slice(0,3);
          seg.push(`近30分成交佔比升幅前3（次產業，全日→近30分）：${rising.map(r=>`${cleanSub(r.name)} ${r.fullDay.toFixed(1)}%→${r.now30.toFixed(1)}%`).join("、")}`);
        } else seg.push(`近30分成交佔比升幅：盤中短窗資金未生效，此項略過。`);
        const m = live.market||{};
        const up=((m.tse&&m.tse.up)||0)+((m.otc&&m.otc.up)||0), down=((m.tse&&m.tse.down)||0)+((m.otc&&m.otc.down)||0);
        const flat=((m.tse&&m.tse.flat)||0)+((m.otc&&m.otc.flat)||0);
        if (up+down+flat>0) seg.push(`漲跌家數廣度：漲${up}／平${flat}／跌${down}`);
        if (seg.length) parts.push(`${dlabel("即時一覽快照", primary)}\n${seg.join("\n")}`);
      }
    }catch(e){ /* 快照段組裝失敗不影響既有語境 */ }
  }
  return { text: parts.join("\n\n"), primary, dates };
}

function ovSparkline(series,key,w,h){

  if(pts.length<2)return null;
  const min=Math.min(...pts), max=Math.max(...pts), span=(max-min)||1, n=pts.length;

    `<path d="${path}" fill="none" stroke="${color}" stroke-width="1.5"/></svg>`;

function ovAggBy(filterFn,groupByFn){

      const o=out[name]||(out[name]={name,amt:0,wchg:0,f30:0,up:0,down:0,n:0,codes:[]});

// N 欄近似 treemap：依 amt 由大到小貪婪分 N 欄（各欄加總盡量平衡）。

function ovTreemapSplit(items,nCols){

  for(let n=2;n<=4;n++){

    let minPx=Infinity;
    for(const col of r.cols){
      if(!col.length)continue;
      const cs=col.reduce((a,x)=>a+Math.max(x.amt,0),0); if(cs<=0)continue;

    }

  }

}
// ---- 案三（2026-07-19）：盤外/週末收盤定格 fallback ----
// /live 只在 flow=null 時附頂層 flow_last（Worker 於交易日 13:25–13:40 定格最後一份非 null flow）。
// 範圍鐵律：只有「象限圖＋treemap 角標」退回定格值；雷達/儀表列/定調句/總表近30分欄/湧入退出 tab
// 一律照舊吃 state.live.flow（盤外維持既有「盤中生效」降級），回放模式也不適用 fallback。
function ovFlowLast(){
  const l=state.live;
  if(OV_REPLAY||!l)return null;
  if(l.flow&&l.flow.mkt&&l.flow.mkt.d30_yi)return null;   // 盤中 flow 生效 → 不用定格
  const fl=l.flow_last;
  return (fl&&fl.mkt&&fl.mkt.d30_yi&&fl.f30)?fl:null;
}
// treemap 聚合用個股 f30：盤中用 /live 個股欄（v.f30），盤外定格退 flow_last.f30[code]（缺鍵視同 0）
function ovF30(c,v){
  const last=ovFlowLast();
  if(last)return last.f30[c]||0;
  return (v&&v.f30)||0;
}
// 徽章：使用定格資料時標註資料日（象限與地圖視角標題列共用）
function ovFlowLastBadge(){

}
// 角標：群組近30分成交佔比 vs 全日成交佔比（f30聚合÷flow.mkt.d30_yi 對比 amt÷market.tse.amt_yi）
function ovTreemapBadge(amtRaw,f30Raw){
  if(OV_REPLAY)return "";   // 第五期：近30分升降屬短窗，回放模式不適用
  const mktAmt=(state.live.market&&state.live.market.tse&&state.live.market.tse.amt_yi)||0;
  const fl=state.live.flow;let d30=fl&&fl.mkt?fl.mkt.d30_yi:null;
  const last=d30==null?ovFlowLast():null; if(last)d30=last.mkt.d30_yi;   // 案三：盤外退收盤定格
  if(!mktAmt||d30==null)return "";
  const fullShr=(amtRaw/1e8)/mktAmt*100, now30=(f30Raw/1e8)/d30*100, diff=now30-fullShr;
  return diff>0.3?'<span class="ovtbadge up">↑</span>':diff<-0.3?'<span class="ovtbadge down">↓</span>':"";
}
function ovTreemapCellCls(chg){

}
// 佔比<minShare 的尾項合併為「其他N項」：避免 .ovtcell 8px padding 渲染下限把極小格撐大（面積失真），
// 也避免不可讀的碎格。輸入須為 amt 降冪排序。
function ovMergeSmall(arr,minShare){
  const total=arr.reduce((a,r)=>a+Math.max(r.amt,0),0)||1;
  const keep=[],rest=[];
  for(const it of arr){(Math.max(it.amt,0)/total<minShare?rest:keep).push(it);}
  if(rest.length===1)keep.push(rest[0]);
  else if(rest.length>1){
    const rAmt=rest.reduce((a,r)=>a+r.amt,0),rF30=rest.reduce((a,r)=>a+(r.f30||0),0);
    keep.push({name:`其他${rest.length}項`,amt:rAmt,f30:rF30,
      chg:rAmt?rest.reduce((a,r)=>a+(r.chg||0)*r.amt,0)/rAmt:null,isRest:true});
  }
  return keep;
}
// 第一層入格門檻：佔比 ≥1% 具名成格，其餘合併為「其餘N條」（可下鑽展開）
const OV_TREE_MIN_SHARE=0.01;
// 未入鏈六分類（2026-07-19 使用者回饋）：ETF 依代碼型態拆五類（皆 00 開頭），其餘非 ETF 歸「未入鏈」
const OV_UNC_ORDER=["一般ETF","主動型ETF","債券型ETF","反向ETF","槓桿型ETF","未入鏈"];
function ovUncGroup(c){
  if(/^00\d+$/.test(c))return "一般ETF";
  if(/^00\d+A$/.test(c))return "主動型ETF";
  if(/^00\d+B$/.test(c))return "債券型ETF";
  if(/^00\d+R$/.test(c))return "反向ETF";
  if(/^00\d+L$/.test(c))return "槓桿型ETF";
  return "未入鏈";
}
// 第一層資料：47 條鏈聚合＋未入鏈六分類聚合（state.live.stocks 全集中無 cl 條目或 info.c 為空者）
function ovChainAgg(){
  const arr=Object.values(ovAggBy(null,info=>info.c||[])).sort((a,b)=>b.amt-a.amt);
  const ug={};
  for(const c in state.live.stocks){
    const info=state.cl[c];
    if(info&&(info.c||[]).length)continue;
    const v=ovVal(c); if(!v)continue;
    const g=ovUncGroup(c);
    const o=ug[g]||(ug[g]={name:g,amt:0,f30:0,w:0,n:0});
    o.amt+=v.amt||0; o.f30+=ovF30(c,v); o.w+=(v.chg||0)*(v.amt||0); o.n++;   // 案三：f30 盤外退定格
  }
  const uncGroups=OV_UNC_ORDER.filter(g=>ug[g]).map(g=>({...ug[g],chg:ug[g].amt?ug[g].w/ug[g].amt:null}));
  const total=arr.reduce((a,r)=>a+r.amt,0)+uncGroups.reduce((a,r)=>a+r.amt,0);

}
// 未入鏈個股代碼清單（口徑同 ovChainAgg）；grp 給定時只取該分類
function ovUncCodes(grp){

// 分類表本身有一條鏈叫「其他」，顯示加註「（分類節點）」與合併格區隔。
// 注意：disp 欄位不經 cleanSub（cleanSub 會剝掉括號內文字）
const ovChainDisp=name=>name==="其他"?"其他（分類節點）":cleanSub(name);
// ---- 案二：資金象限圖視角（純 SVG，無外部函式庫）----
// x=次產業加權漲跌%（由 OV_SUB_CACHE codes 現算，amt 加權）
// y=盤中資金動向 pp＝近30分佔比−全日佔比（口徑同 ovTreemapBadge：f30÷d30_yi vs amt÷tse.amt_yi）
// 泡泡面積∝全日成交佔比：r=k√share，k=最大泡半徑/√最大佔比；不設半徑下限，維持面積恆等
const OV_QUAD_N=36;        // 取成交值前 N 個次產業（規格 30~40）
const OV_QUAD_LBL_TOP=12;  // 面積前幾名直接標名
const OV_QUAD_LBL_R=12;    // 或半徑 ≥ 此值(px) 也標名；其餘 hover（<title>）
// ---- 象限圖 pinch/pan 縮放（2026-07-21）：純 CSS transform，不引外部庫；狀態跨重繪保留（20 秒刷新不重置）----
let OV_QUAD_TF={s:1,x:0,y:0};
function ovQuadApply(svg){svg.style.transformOrigin="0 0";svg.style.transform=`translate(${OV_QUAD_TF.x}px,${OV_QUAD_TF.y}px) scale(${OV_QUAD_TF.s})`;}
function ovQuadClamp(){OV_QUAD_TF.s=Math.min(6,Math.max(1,OV_QUAD_TF.s));if(OV_QUAD_TF.s<=1.001){OV_QUAD_TF={s:1,x:0,y:0};}}
// 每次 renderOverview 重繪後呼叫：#ovQuadZoom 存在才綁定（象限視角）；泡泡點擊下鑽沿用 document 委派，
// 平移超過閾值時以 stopPropagation 取消該次 click，避免拖曳誤觸下鑽。
function ovQuadZoomInit(){
  const box=document.getElementById("ovQuadZoom");if(!box)return;
  const svg=box.querySelector("svg");if(!svg)return;
  ovQuadApply(svg);
  const pts=new Map();let startDist=0,startS=1,startMid=null,startTF=null,moved=false,panLast=null;
  const zoomAbout=(ox,oy,k)=>{OV_QUAD_TF.x=ox-(ox-OV_QUAD_TF.x)*k;OV_QUAD_TF.y=oy-(oy-OV_QUAD_TF.y)*k;};
  box.onpointerdown=e=>{try{box.setPointerCapture(e.pointerId);}catch(_){}
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY});moved=false;panLast={x:e.clientX,y:e.clientY};
    if(pts.size===2){const a=[...pts.values()];startDist=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);startS=OV_QUAD_TF.s;
      const r=box.getBoundingClientRect();startMid={x:(a[0].x+a[1].x)/2-r.left,y:(a[0].y+a[1].y)/2-r.top};startTF={...OV_QUAD_TF};}};
  box.onpointermove=e=>{if(!pts.has(e.pointerId))return;pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pts.size>=2){const a=[...pts.values()];const d=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);
      if(startDist>0){const ratio=d/startDist;OV_QUAD_TF={...startTF};OV_QUAD_TF.s=startS*ratio;
        zoomAbout(startMid.x,startMid.y,OV_QUAD_TF.s/startTF.s);ovQuadClamp();ovQuadApply(svg);moved=true;e.preventDefault();}}
    else if(pts.size===1&&OV_QUAD_TF.s>1&&panLast){const dx=e.clientX-panLast.x,dy=e.clientY-panLast.y;
      if(Math.hypot(e.clientX-(panLast.x),e.clientY-(panLast.y))>0)moved=true;
      OV_QUAD_TF.x+=dx;OV_QUAD_TF.y+=dy;panLast={x:e.clientX,y:e.clientY};ovQuadApply(svg);e.preventDefault();}};
  const up=e=>{pts.delete(e.pointerId);if(pts.size<2)startDist=0;if(pts.size===0)panLast=null;};
  box.onpointerup=up;box.onpointercancel=up;
  box.onclick=e=>{if(moved){e.stopPropagation();e.preventDefault();moved=false;}};   // 拖曳/縮放後的 click 不下鑽
  box.onwheel=e=>{e.preventDefault();const r=box.getBoundingClientRect();const ox=e.clientX-r.left,oy=e.clientY-r.top;
    const old=OV_QUAD_TF.s;OV_QUAD_TF.s*=(e.deltaY<0?1.15:1/1.15);ovQuadClamp();zoomAbout(ox,oy,OV_QUAD_TF.s/old);ovQuadApply(svg);};
  box.ondblclick=()=>{OV_QUAD_TF={s:1,x:0,y:0};ovQuadApply(svg);};
}
function ovQuadrantHtml(){

  const last=d30==null?ovFlowLast():null; if(last)d30=last.mkt.d30_yi;   // 案三：盤外/週末退最後收盤定格

  const rows=Object.values(OV_SUB_CACHE).sort((a,b)=>b.amt-a.amt).slice(0,OV_QUAD_N).map(s=>{
    let w=0,amt=0;const chAmt={};   // 加權漲跌現算＋找該次產業成交值最大的所屬鏈（下鑽用）
    for(const c of s.codes){const v=ovVal(c);if(!v)continue;
      w+=(v.chg||0)*(v.amt||0);amt+=v.amt||0;
      const info=state.cl[c];if(info&&info.p)for(const p of info.p)if(p[1]===s.name)chAmt[p[0]]=(chAmt[p[0]]||0)+(v.amt||0);}
    const f30=last?s.codes.reduce((a,c)=>a+(last.f30[c]||0),0):s.f30;   // 案三：定格時逐檔取 flow_last.f30
    const share=(s.amt/1e8)/mktAmt*100, now30=(f30/1e8)/d30*100;
    return {name:s.name,chg:amt?w/amt:0,share,y:now30-share,
      chain:Object.keys(chAmt).sort((a,b)=>chAmt[b]-chAmt[a])[0]||""};
  }).filter(r=>r.share>0);
  if(!rows.length)return `<div class="loading">此時段無足夠次產業資料。</div>`;
  const W=720,H=456,mL=54,mR=20,mT=28,mB=44,pw=W-mL-mR,ph=H-mT-mB;

  let ymin=Math.min(0,...ys),ymax=Math.max(0,...ys);const py=((ymax-ymin)||1)*0.12;ymin-=py;ymax+=py;
  const X=v=>mL+(v-xmin)/(xmax-xmin)*pw, Y=v=>mT+ph-(v-ymin)/(ymax-ymin)*ph;

  rows.forEach(r=>{r.r=k*Math.sqrt(r.share);r.cx=X(r.chg);r.cy=Y(r.y);});
  const x0=X(0),y0=Y(0);

  let svg=`<rect x="${x0}" y="${mT}" width="${mL+pw-x0}" height="${y0-mT}" fill="var(--up)" opacity="0.06"/>`+
    `<rect x="${mL}" y="${mT}" width="${x0-mL}" height="${y0-mT}" fill="var(--down)" opacity="0.03"/>`+
    `<rect x="${x0}" y="${y0}" width="${mL+pw-x0}" height="${mT+ph-y0}" fill="var(--up)" opacity="0.03"/>`+
    `<rect x="${mL}" y="${y0}" width="${x0-mL}" height="${mT+ph-y0}" fill="var(--down)" opacity="0.06"/>`;
  const corner=(x,y,anchor,txt)=>`<text x="${x}" y="${y}" text-anchor="${anchor}" font-size="13" font-weight="700" fill="var(--dim)">${txt}</text>`;
  svg+=corner(mL+pw-6,mT+14,"end","主流吸金")+corner(mL+6,mT+14,"start","逆勢吸金")+
       corner(mL+pw-6,mT+ph-8,"end","無量上漲")+corner(mL+6,mT+ph-8,"start","殺量退潮");

    `<line x1="${mL}" y1="${y0}" x2="${mL+pw}" y2="${y0}" stroke="var(--dim)" stroke-dasharray="3,3" opacity="0.6"/>`;

    `<text x="${x0}" y="${H-10}" font-size="12.5" fill="var(--dim)" text-anchor="middle">0</text>`+
    `<text x="${mL+pw}" y="${H-10}" font-size="12.5" fill="var(--dim)" text-anchor="end">${xmax.toFixed(1)}%</text>`+
    `<text x="${mL-5}" y="${mT+12}" font-size="12.5" fill="var(--dim)" text-anchor="end">${ymax.toFixed(2)}</text>`+

    `<text x="${mL-5}" y="${mT+ph}" font-size="12.5" fill="var(--dim)" text-anchor="end">${ymin.toFixed(2)}</text>`+
    `<text x="${mL+pw}" y="${H-25}" font-size="12.5" fill="var(--dim)" text-anchor="end">x=加權漲跌%</text>`+

  // 泡泡：大→小繪製（小泡在上層可點）；紅漲綠跌平盤灰；全部帶 <title> hover
  const bub=rows.map(r=>{

    if(st.treeSub)crumbHtml+=` › <span>${escI(cleanSub(st.treeSub))}</span>`;
  }
  const head=`<div class="crumb"><b>資金地圖</b> ${pills}${ovFlowLastBadge()} ${crumbHtml} <span class="mut">面積=成交值佔比 · 顏色=漲跌(深淺) · ${OV_REPLAY?"角標(近30分)：回放模式不適用":"角標=近30分資金升降"}</span></div>`;

  let items, mkAttr, footNote="";
  if(st.treeUnc){
    // 未入鏈分類個股列表層（樣式同第三層個股格；口徑見 ovUncCodes(grp)）
    let all=ovUncCodes(st.treeUnc).map(c=>{const v=ovVal(c)||{},info=state.cl[c]||{};
      return {name:info.n||c, amt:v.amt||0, f30:ovF30(c,v), chg:v.chg};}).sort((a,b)=>b.amt-a.amt);
    footNote=`<div class="ovtfoot">「${escI(st.treeUnc)}」（無產業鏈分類）個股共 ${all.length} 檔${all.length>24?`，另有 ${all.length-24} 檔成交值較小未顯示`:""}。</div>`;
    if(all.length>24)all=all.slice(0,24);
    items=ovMergeSmall(all,0.02);
    mkAttr=()=>"";
  }else if(st.treeUncRest){
    // 「其餘未入鏈」展開層：列出第一層佔比 <門檻 的灰系分類，每類可續鑽個股列表
    const ca=ovChainAgg();
    items=ca.uncGroups.filter(g=>g.amt/ca.total<OV_TREE_MIN_SHARE).map(g=>({...g,isUnc:true,unc:g.name}));
    footNote=`<div class="ovtfoot">本層為第一層佔比 &lt;${(OV_TREE_MIN_SHARE*100).toFixed(0)}% 的 ${items.length} 個未入鏈分類（ETF／無產業鏈個股），佔比以本層加總為分母。</div>`;
    mkAttr=it=>`data-ovtree-unc="${encodeURIComponent(it.unc)}"`;
  }else if(!st.treeChain&&st.treeRest){
    // 「其餘N條」展開層：列出全部佔比<門檻的鏈，每條可續鑽次產業
    const ca=ovChainAgg();
    items=ca.arr.filter(r=>r.amt/ca.total<OV_TREE_MIN_SHARE).map(r=>({...r,disp:ovChainDisp(r.name)}));
    footNote=`<div class="ovtfoot">本層為第一層佔比 &lt;${(OV_TREE_MIN_SHARE*100).toFixed(0)}% 的 ${items.length} 條產業鏈，佔比以本層加總為分母。</div>`;
    mkAttr=it=>`data-ovtree-chain="${encodeURIComponent(it.name)}"`;
  }else if(!st.treeChain){
    // 第一層：動態門檻（佔比 ≥OV_TREE_MIN_SHARE 具名成格）＋「其餘N條」合併格＋「未入鏈」灰格
    const ca=ovChainAgg();
    const keep=ca.arr.filter(r=>r.amt/ca.total>=OV_TREE_MIN_SHARE);
    const rest=ca.arr.filter(r=>r.amt/ca.total<OV_TREE_MIN_SHARE);
    items=keep.map(r=>({...r,disp:ovChainDisp(r.name)}));
    if(rest.length){
      const rAmt=rest.reduce((a,r)=>a+r.amt,0), rF30=rest.reduce((a,r)=>a+r.f30,0);
      items.push({name:"__rest__", disp:`其餘${rest.length}條（合計${(rAmt/ca.total*100).toFixed(1)}%）`,
        amt:rAmt, f30:rF30, chg:rAmt?rest.reduce((a,r)=>a+r.chg*r.amt,0)/rAmt:0, isRest:true, isRestExp:true});
    }
    // 未入鏈六分類灰格：佔比 ≥門檻 各自成格（可下鑽個股）；<1% 者合併「其餘未入鏈」（可下鑽展開層）；
    // 恰一類 <1% 時直接成格，避免為單一分類多一層（2026-07-19 決定，動態門檻規則沿用）
    const bigU=ca.uncGroups.filter(g=>g.amt/ca.total>=OV_TREE_MIN_SHARE);
    const smallU=ca.uncGroups.filter(g=>g.amt/ca.total<OV_TREE_MIN_SHARE);
    for(const g of bigU)items.push({...g,isUnc:true,unc:g.name});
    if(smallU.length===1)items.push({...smallU[0],isUnc:true,unc:smallU[0].name});
    else if(smallU.length){
      const uAmt=smallU.reduce((a,g)=>a+g.amt,0), uF30=smallU.reduce((a,g)=>a+g.f30,0);
      items.push({name:"__uncrest__", disp:`其餘未入鏈（合計${(uAmt/ca.total*100).toFixed(1)}%）`,
        amt:uAmt, f30:uF30, chg:uAmt?smallU.reduce((a,g)=>a+(g.chg||0)*g.amt,0)/uAmt:null, isUnc:true, isUncRest:true});
    }
    items.sort((a,b)=>b.amt-a.amt);
    footNote=`<div class="ovtfoot">一檔可屬多條產業鏈（分類重疊），各格佔比以本層加總為分母；灰格＝ETF／無產業鏈分類。</div>`;
    mkAttr=it=>it.isRestExp?'data-ovtree-rest="1"':it.isUncRest?'data-ovtree-uncrest="1"':it.isUnc?`data-ovtree-unc="${encodeURIComponent(it.unc)}"`:`data-ovtree-chain="${encodeURIComponent(it.name)}"`;
  }else if(!st.treeSub){
    const agg=ovAggBy(null, info=>(info.p||[]).filter(p=>p[0]===st.treeChain).map(p=>p[1]));
    items=ovMergeSmall(Object.values(agg).sort((a,b)=>b.amt-a.amt),0.02);
    mkAttr=it=>it.isRest?"":`data-ovtree-sub="${encodeURIComponent(it.name)}"`;
  }else{
    const codes=Object.keys(state.live.stocks).filter(c=>{
      const info=state.cl[c]; return info&&info.t==="twse"&&info.p&&info.p.some(p=>p[0]===st.treeChain&&p[1]===st.treeSub);
    });
    let all=codes.map(c=>{const v=ovVal(c)||{},info=state.cl[c]||{};
      return {name:info.n||c, amt:v.amt||0, f30:ovF30(c,v), chg:v.chg};}).sort((a,b)=>b.amt-a.amt);
    if(all.length>24){footNote=`<div class="ovtfoot">另有 ${all.length-24} 檔成交值較小未顯示。</div>`; all=all.slice(0,24);}
    items=ovMergeSmall(all,0.02);
    mkAttr=()=>"";
  }
  if(!items.length)return head+`<div class="loading">此分類暫無資料。</div>`;
  const total=items.reduce((a,r)=>a+r.amt,0)||1;
  const {cols}=ovTreemapAutoSplit(items);
  const cellHtml=(it,colSum)=>{
    const attr=mkAttr(it), clickable=attr!=="";
    const h=Math.max(it.amt,0)/colSum*100;
    const cls=it.isUnc?"ovt-flat":ovTreemapCellCls(it.chg);   // 未入鏈/ETF 固定灰系格
    const nm=it.disp!=null?it.disp:cleanSub(it.name);
    const shr=it.amt/total*100, shrTxt=shr.toFixed(shr<0.995?2:1)+"%";   // <1% 顯示兩位小數（一位小數的捨入會讓小格「面積 vs 顯示%」相對誤差虛增）
    const line=`${nm} ${shrTxt} ${it.chg==null?"—":pctTxt(it.chg)}`;
    return `<div class="ovtcell ${cls}${clickable?"":" novtclick"}" style="height:${h.toFixed(3)}%" ${attr} title="${escI(line)}${it.isUnc?"（無產業鏈分類）":""}">`+
      `<div class="ovtname">${escI(nm)}</div>`+
      `<div class="ovtmeta">${shrTxt} ${it.chg==null?"—":pctTxt(it.chg)}</div>`+
      ovTreemapBadge(it.amt,it.f30)+
    `</div>`;
  };
  const colsHtml=cols.filter(col=>col.length).map(col=>{
    const colSum=Math.max(col.reduce((a,r)=>a+Math.max(r.amt,0),0),1e-9);
    return `<div class="ovtcol" style="flex:0 0 ${(colSum/total*100).toFixed(3)}%">${col.map(it=>cellHtml(it,colSum)).join("")}</div>`;
  }).join("");
  return head+`<div class="ovtree">${colsHtml}</div>`+footNote;
}
// ---- 第二期：30分動能（次產業近10分 vs 前20分斜率比）----
function ovMomentum(f10,f30){
  if(f10==null||f30==null)return {label:"—",cls:"mut"};
  const r10=f10/10, prior=(f30-f10)/20;
  if(prior<=0)return r10>0?{label:"加速",cls:"up"}:{label:"持平",cls:"mut"};
  const ratio=r10/prior;
  if(ratio>1.2)return {label:"加速",cls:"up"};
  if(ratio<0.8)return {label:"走弱",cls:"down"};
  return {label:"持平",cls:"mut"};
}
function ovDashboard(){

  else if(mkt&&mkt.d10_yi!=null&&mkt.d30_yi!=null&&mkt.d30_yi!==0){

    rateHtml=`<div class="sub">近10分 ${r10.toFixed(2)}億/分 · 近30分 ${r30.toFixed(2)}億/分 ${label}</div>`;
  }else rateHtml=`<div class="sub mut">短窗資金：盤中生效</div>`;
  // 加權/櫃買分開呈現（2026-07-19 使用者指示）；回放時 split 來自 frame 分類加總（近似），合計優先 series 實際值
  const tseAmt=rp?rp.mkt.tseYi:(t.amt_yi||0), otcAmt=rp?rp.mkt.otcYi:(o.amt_yi||0);
  const amtCard=`<div class="ovcard"><div class="h">${rp?"當時":"今日"}累計成交值</div>`+
    `<div class="v" style="font-size:15px">加權 ${yi(tseAmt)}／櫃買 ${yi(otcAmt)}</div>`+

  const downLim=rp?null:(m.tse&&m.tse.down_lim||0)+(m.otc&&m.otc.down_lim||0);
  const limTxt=(n,cls)=>n==null?"":`<span class="${cls}" style="font-size:11px">(停${n})</span>`;

    :(phase?`<div class="ovphase">${escI(phase.badge)}</div>`:"");
  return phaseHtml+`<div class="ovcards">${idxCard}${amtCard}${breadthCard}</div>`;
}
// 規則式定調句：素材＝貢獻第一群組＋領頭股、貢獻集中度、近30分佔比升幅最大次產業、拖累前1-2群組。
// |指數漲跌點|<15 → 多空拉鋸語序；跌盤時整段鏡像（拖累/助漲互換）。
function ovHeadline(){
  const ix=ovIndexView().tse||{};   // 第五期：回放時為重建近似指數
  if(ix.chgP==null)return `<div class="ovsent mut">大盤資料載入中…</div>`;
  // 第三期：定調句框右緣「AI 深入解讀」→ 切到摘要分析 tab（不自動呼叫 Claude，沿用該 tab 既有按鈕流程）
  // 第五期：回放中隱藏（insight 語境是即時快照，與回放畫面不一致）
  const aiBtn=OV_REPLAY?"":`<button class="seg2" data-ov-insight style="float:right;margin-left:8px">AI 深入解讀 →</button>`;
  const pIdx=ix.chgP;
  const subs=Object.values(OV_SUB_CACHE).filter(s=>s.n>=3);
  const flowOk=!OV_REPLAY&&!!(state.live.flow&&state.live.flow.mkt&&state.live.flow.mkt.d30_yi);
  const mktAmt=ovMktTseYi();
  const withShare=subs.map(s=>{
    const fullDay=mktAmt?(s.amt/1e8)/mktAmt*100:0;
    const now30=flowOk?(s.f30/1e8)/state.live.flow.mkt.d30_yi*100:null;
    return {...s, fullDay, now30, diff:now30!=null?now30-fullDay:null};
  });
  const flowSuffix=flowOk?"":(OV_REPLAY?"短窗資金：回放模式不適用":"短窗資金：盤中生效");
  if(Math.abs(pIdx)<15){
    const up1=[...subs].sort((a,b)=>b.pts-a.pts)[0], dn1=[...subs].sort((a,b)=>a.pts-b.pts)[0];
    const parts=[];
    if(up1&&up1.pts>0)parts.push(`上有${cleanSub(up1.name)}（${sgnTxt(up1.pts)}點）`);
    if(dn1&&dn1.pts<0)parts.push(`下有${cleanSub(dn1.name)}（${sgnTxt(dn1.pts)}點）`);
    return `<div class="ovsent">${aiBtn}多空拉鋸：大盤${sgnTxt(pIdx)}點（${pctTxt(ix.chg)}）。${parts.join("，")}${parts.length?"。":""}`+
      `${flowOk?"":`<span class="mut">${flowSuffix}</span>`}</div>`;
  }
  const isUp=pIdx>0;
  const sortedByDir=[...subs].sort((a,b)=>isUp?b.pts-a.pts:a.pts-b.pts);
  const top=sortedByDir.find(s=>isUp?s.pts>0:s.pts<0);
  let topClause="";
  if(top){
    const leaderName=(state.cl[top.leaderCode]&&state.cl[top.leaderCode].n)||top.leaderCode||"";
    // 佔跌/漲點 % 依範例定義為「領頭股」貢獻點佔指數總點數（非整個次產業群組）
    const sharePct=pIdx?Math.abs(top.leaderPts)/Math.abs(pIdx)*100:0;
    const conc=ovConcentration(pIdx);
    topClause=`${cleanSub(top.name)}${isUp?"貢獻":"拖累"} ${sgnTxt(top.pts)} 點（${leaderName} ${sgnTxt(top.leaderPts)}，佔${isUp?"漲":"跌"}點 ${sharePct.toFixed(0)}%，行情${conc}）`;
  }
  let shareClause="";
  if(flowOk){
    const rising=withShare.filter(s=>s.diff!=null).sort((a,b)=>isUp?b.diff-a.diff:a.diff-b.diff)[0];
    if(rising&&Math.abs(rising.diff)>=1)
      shareClause=`；${cleanSub(rising.name)}近30分成交佔比 ${rising.fullDay.toFixed(1)}%→${rising.now30.toFixed(1)}%，資金${isUp?"湧入":"流出"}`;
  }else shareClause=`；<span class="mut">${flowSuffix}</span>`;
  const dragCandidates=[...subs].filter(s=>s!==top).filter(s=>isUp?s.pts<0:s.pts>0)
    .sort((a,b)=>isUp?a.pts-b.pts:b.pts-a.pts).slice(0,2);
  let dragClause="";
  if(dragCandidates.length)dragClause=`；${dragCandidates.map(s=>cleanSub(s.name)).join("、")}小幅${isUp?"拖累":"助漲"}`;
  return `<div class="ovsent">${aiBtn}大盤 ${sgnTxt(pIdx)} 點：${topClause||"資料不足"}${shareClause}${dragClause}。</div>`;
}
// 貢獻點發散長條三視角：次產業(自聚合)／產業鏈(直接用 live.chain 既有加總)／個股(+其他合計殘差)
function ovContribItems(view){
  if(view==="chain"){
    if(OV_REPLAY){   // 第五期：live.chain 是即時值，回放改由回放個股值按產業鏈自聚合
      const agg={};
      for(const c in OV_REPLAY.vals){
        const info=state.cl[c]; if(!info||info.t!=="twse"||!info.c||!info.c.length)continue;
        const pts=OV_REPLAY.vals[c].pts||0; if(!pts)continue;
        for(const ch of new Set(info.c))agg[ch]=(agg[ch]||0)+pts;
      }
      return Object.keys(agg).map(k=>({name:k,pts:agg[k]})).filter(r=>r.pts);
    }
    return (state.live.chain||[]).map(s=>({name:s.sector,pts:(s.tse&&s.tse.pts)||0})).filter(r=>r.pts);
  }
  if(view==="stock")return Object.keys(state.live.stocks).filter(c=>(state.cl[c]||{}).t==="twse")
    .map(c=>{const v=ovVal(c)||{},info=state.cl[c]||{};return {name:info.n||c,pts:v.pts||0};}).filter(r=>r.pts);
  return Object.values(OV_SUB_CACHE).map(s=>({name:cleanSub(s.name),pts:s.pts})).filter(r=>r.pts);
}

function ovDivergingBar(view){
  const items=ovContribItems(view);
  const pos=[...items].filter(r=>r.pts>0).sort((a,b)=>b.pts-a.pts).slice(0,5);   // 2026-07-19：改拉抬前5＋拖累前5
  const neg=[...items].filter(r=>r.pts<0).sort((a,b)=>a.pts-b.pts).slice(0,5);
  let rows=[...pos,...neg];
  let noteHtml;
  if(view==="stock"){
    const sumShown=rows.reduce((a,r)=>a+r.pts,0);
    const ix=ovIndexView().tse;   // 第五期：回放時殘差對回放重建指數
    const resid=(ix&&ix.chgP!=null)?ix.chgP-sumShown:null;
    if(resid!=null&&Math.abs(resid)>0.05)rows.push({name:"其他合計",pts:resid});
    noteHtml="";
  }else noteHtml='<div class="note mut">分類重疊，不可直接加總。</div>';
  rows.sort((a,b)=>a.pts-b.pts);   // 左跌右漲：由最負到最正排列
  if(!rows.length)return noteHtml+'<div class="loading">暫無資料。</div>';
  const maxAbs=Math.max(1,...rows.map(r=>Math.abs(r.pts)));
  const barRow=r=>{
    const w=Math.min(100,Math.abs(r.pts)/maxAbs*100)/2;

// ---- 第五期：當日回放（時間滑桿）＋收盤總結（2026-07-18）----
// 回放原理：Worker /replay?t=HH:MM 回當日 f:<date>:<HH:MM> frame（{code:[累計成交額,現價]}，
// 缺格自動往前回退 ≤5 分）。配合當前 /live 的昨收（close−dp，交易所漲跌定義）重建當時的
// 漲跌%／貢獻點／成交佔比／廣度。指數為個股市值權重重建近似——TAIEX 是全市值加權：
// Δ指數 ≈ 昨收指數 × Σ(dp×sh) / Σ(昨收×sh)（ETF 排除；sh=發行股數，允許的靜態參數），
// 個股貢獻點 = Δ指數 × (dp×sh)/Σ(dp×sh)，與 worker aggregate 的 pts 同一條鏈路。
// 短窗體系（近10/30分、動能、雷達、提醒）需分鐘級歷史 frame，回放一律標「回放模式不適用」。
let OV_REPLAY=null;        // null=即時；{t,date,vals:{code:{chg,amt,pts,dp,close,f10:null,...}},mkt:{...}}
let OV_REPLAY_ERR=null, OV_REPLAY_SEQ=0, OV_REPLAY_DEB=null;
const ovVal=c=>OV_REPLAY?(OV_REPLAY.vals[c]||null):sval(c);   // ov 區資料入口：回放時整鏈自動吃回放值
function ovIndexView(){

  const ix=state.live.index||{}; return {tse:ix.tse||{},otc:ix.otc||{}};

function ovMktTseYi(){   // 成交佔比分母（上市總額，億）：回放用 frame 加總、即時用 /live
  if(OV_REPLAY)return OV_REPLAY.mkt.tseYi||0;
  return (state.live.market&&state.live.market.tse&&state.live.market.tse.amt_yi)||0;
}
// 2026-07-19 回饋⑤：回放儀表列優先用 series 實際分鐘值（Worker series:<date>；idx=加權指數、
// chg=漲跌點、amt=全市場累計成交額億，皆交易所口徑）。查無該分鐘（series 漏格）→ 回 null，
// 呼叫端退回市值加權重建近似＋保留「近似」標註。OV_REPLAY.t 為 frame 實際分鐘（回退 ≤5 分後），
// series 與 frame 同班寫入，同分鐘對得上。
function ovReplaySeriesPoint(){
  if(!OV_REPLAY||!OV_DAY.series)return null;
  return OV_DAY.series.find(p=>p&&p.t===OV_REPLAY.t)||null;
}
const ovMin2Hm=m=>String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0");
const ovHm2MinF=hm=>+hm.slice(0,2)*60+ +hm.slice(3,5);
function ovReplayBuild(j){
  const vals={}, sumMc={twse:0,tpex:0}, sumPrev={twse:0,tpex:0}, tot={twse:0,tpex:0};
  let totAll=0, up=0, down=0, flat=0;
  for(const c in j.stocks){
    const f=j.stocks[c];
    const amt=Array.isArray(f)?(f[0]||0):(+f||0), price=Array.isArray(f)?f[1]:null;   // 舊 frame 格式（純數字）相容
    const info=state.cl[c];
    if(info&&tot[info.t]!=null){tot[info.t]+=amt; totAll+=amt;}   // 僅計入分類過的個股，排除 002/036 等彙總碼避免重複計

    const lv=sval(c);
    const prev=(lv&&lv.close!=null&&lv.dp!=null)?lv.close-lv.dp:null;   // 昨收＝今收−漲跌價差（交易所定義）
    if(price==null||!(prev>0)){vals[c]={chg:null,amt,pts:0,dp:null,close:price,f10:null,f30:null,r10:null};continue;}
    const dp=price-prev, chg=dp/prev*100;
    vals[c]={chg,amt,pts:0,dp,close:price,f10:null,f30:null,r10:null};
    if(dp>0)up++;else if(dp<0)down++;else flat++;
    const sh=info?(+info.sh||0):0, etf=c.startsWith("00");
    if(sh&&!etf&&info&&sumMc[info.t]!=null){sumMc[info.t]+=dp*sh;sumPrev[info.t]+=prev*sh;}
  }
  const ixL=state.live.index||{};
  const mkIx=(mkt,liveIx)=>{
    if(!liveIx||liveIx.val==null||liveIx.chgP==null||!sumPrev[mkt])return null;
    const prevIdx=liveIx.val-liveIx.chgP;
    if(!(prevIdx>0))return null;
    const dI=prevIdx*sumMc[mkt]/sumPrev[mkt];
    return {val:prevIdx+dI,chgP:dI,chg:dI/prevIdx*100};
  };
  const tse=mkIx("twse",ixL.tse), otc=mkIx("tpex",ixL.otc);
  for(const c in vals){
    const v=vals[c]; if(v.dp==null)continue;
    const info=state.cl[c]; if(!info)continue;
    const sh=+info.sh||0, etf=c.startsWith("00");
    const ix=info.t==="twse"?tse:info.t==="tpex"?otc:null;
    if(sh&&!etf&&ix&&sumMc[info.t])v.pts=ix.chgP*(v.dp*sh)/sumMc[info.t];
  }
  return {t:j.t,date:j.date,vals,
    mkt:{tse,otc,totAllYi:totAll/1e8,tseYi:tot.twse/1e8,otcYi:tot.tpex/1e8,up,down,flat}};
}
async function ovReplayGo(hm){
  if(!CFG.worker){OV_REPLAY_ERR="未設定 Worker，無法回放";renderOverview(true);return;}
  const seq=++OV_REPLAY_SEQ;   // 防競態：拖動連發時只認最後一發
  try{
    const j=await loadJSON(CFG.worker+"/replay?t="+encodeURIComponent(hm));
    if(seq!==OV_REPLAY_SEQ)return;
    if(!j||!j.stocks){
      OV_REPLAY_ERR="今日無盤中資料"+(j&&j.error?`（${j.error}）`:"（週末/假日或該時段無快照）");
      renderOverview(true);return;   // 已在回放中則保留原畫面＋提示；未在回放則維持即時
    }
    OV_REPLAY=ovReplayBuild(j); OV_REPLAY_ERR=null;
    ovDaySeries();   // 2026-07-19 回饋⑤：預抓全日 series（有快取只抓一次），儀表列優先用實際分鐘值
    renderOverview(true);
  }catch(e){
    if(seq===OV_REPLAY_SEQ){OV_REPLAY_ERR="回放讀取失敗："+(e&&e.message||e);renderOverview(true);}
  }
}
function ovReplayBar(){
  const cur=OV_REPLAY?ovHm2MinF(OV_REPLAY.t):810;
  return `<div class="ovreplaybar"><b>當日回放</b>`+
    `<input type="range" id="ovReplaySlider" min="540" max="810" step="1" value="${cur}" aria-label="回放時間（09:00–13:30）">`+
    `<span id="ovReplayLbl" style="font-weight:700;min-width:40px">${OV_REPLAY?escI(OV_REPLAY.t):"13:30"}</span>`+
    (OV_REPLAY?`<button class="btn" data-ov-replay-live>回到即時</button>`
              :`<span class="mut">拖動滑桿回看當日任一分鐘（拖動停 0.5 秒後載入）</span>`)+
    (OV_REPLAY_ERR?`<span class="mut">${escI(OV_REPLAY_ERR)}</span>`:"")+
    `</div>`;
}
document.addEventListener("input",e=>{
  if(e.target.id!=="ovReplaySlider")return;
  const hm=ovMin2Hm(+e.target.value);
  const lbl=document.getElementById("ovReplayLbl"); if(lbl)lbl.textContent=hm;
  if(OV_REPLAY_DEB)clearTimeout(OV_REPLAY_DEB);
  OV_REPLAY_DEB=setTimeout(()=>{OV_REPLAY_DEB=null;ovReplayGo(hm);},500);   // debounce ≥500ms 才打 /replay
});
document.addEventListener("click",e=>{
  if(e.target.closest("[data-ov-replay-live]")){
    OV_REPLAY=null;OV_REPLAY_ERR=null;OV_REPLAY_SEQ++;
    if(OV_REPLAY_DEB){clearTimeout(OV_REPLAY_DEB);OV_REPLAY_DEB=null;}
    renderOverview(true);return;   // state.live 一直有在背景更新，立即接上最新盤面
  }
  if(e.target.closest("[data-ov-copy]")){ovCopySummary();return;}
});
// ---- 收盤總結（純前端；13:35 後或 stale 定格時顯示）----
// 全日曲線來源：/replay 不帶 t 回當日全日分鐘序列（Worker series:<date>，1 次 get）；
// 取不到時退回 /live 的近 60 分 series 並註明。
let OV_DAY={req:false,series:null};
function ovDaySeries(){
  if(OV_DAY.series&&OV_DAY.series.length)return OV_DAY.series;
  if(!OV_DAY.req&&CFG.worker){
    OV_DAY.req=true;
    // 用 /live 的交易日（週末=上一交易日，與總結卡標題/定格資料同口徑），非真實今日
    const d=(state.live.ts||"").slice(0,10);
    const q=/^\d{4}-\d{2}-\d{2}$/.test(d)?"?date="+d:"";
    loadJSON(CFG.worker+"/replay"+q).then(j=>{
      if(j&&j.series&&j.series.length){
        OV_DAY.series=j.series;
        // 回放中滑桿常持有焦點（renderOverview 輸入保護會跳過重繪）→ 該情境放行 force，
        // 讓儀表列即時換上 series 實際分鐘值；其他焦點（提醒設定輸入框）照舊保護
        const a=document.activeElement;
        if(state.tab==="ov")renderOverview(!!(a&&a.id==="ovReplaySlider"));
      }
    }).catch(()=>{});
  }
  return null;
}
let OV_SUMMARY_TEXT="";
function ovSummaryCard(){
  const phase=ovMarketPhase();
  if(!phase||!phase.closed||OV_REPLAY)return "";
  const ix=(state.live.index&&state.live.index.tse)||{};
  if(ix.chgP==null)return "";
  const day=ovDaySeries(), ser=day||state.live.series||[];
  const srcNote=day?"全日分鐘序列":"近60分序列（全日序列未取得）";
  const idxSpark=ovSparkline(ser,"idx",210,30);
  const rates=[];let prevA=null;
  for(const p of ser){if(!p||p.amt==null)continue;if(prevA!=null)rates.push({rate:Math.max(p.amt-prevA,0)});prevA=p.amt;}
  const rateSpark=ovSparkline(rates,"rate",210,30);
  const rows=Object.keys(state.live.stocks).filter(c=>(state.cl[c]||{}).t==="twse")
    .map(c=>{const v=sval(c)||{};return {code:c,name:(state.cl[c]&&state.cl[c].n)||c,chg:v.chg,pts:v.pts||0};}).filter(r=>r.pts);
  const top5=[...rows].sort((a,b)=>b.pts-a.pts).slice(0,5).filter(r=>r.pts>0);
  const bot5=[...rows].sort((a,b)=>a.pts-b.pts).slice(0,5).filter(r=>r.pts<0);   // 2026-07-19：拖累 3→5，與貢獻並列
  const subs=Object.values(OV_SUB_CACHE).filter(s=>s.n>=3);
  const mktAmt=ovMktTseYi();
  const shareTop=[...subs].sort((a,b)=>b.amt-a.amt)[0];
  const ptsTop=[...subs].sort((a,b)=>b.pts-a.pts)[0];
  const m=state.live.market||{};
  const up=(m.tse&&m.tse.up||0)+(m.otc&&m.otc.up||0), down=(m.tse&&m.tse.down||0)+(m.otc&&m.otc.down||0);
  const shareTxt=shareTop?`${cleanSub(shareTop.name)}（${(mktAmt?(shareTop.amt/1e8)/mktAmt*100:0).toFixed(1)}%）`:"—";
  const ptsTxt=(ptsTop&&ptsTop.pts>0)?`${cleanSub(ptsTop.name)}（${sgnTxt(ptsTop.pts)} 點）`:"—";
  const ptsBot=[...subs].sort((a,b)=>a.pts-b.pts)[0];
  const botTxt=(ptsBot&&ptsBot.pts<0)?`${cleanSub(ptsBot.name)}（${sgnTxt(ptsBot.pts)} 點）`:"—";
  // 全日口徑定調句（無短窗子句；「升幅最大」以全日貢獻點最高口徑呈現——盤中佔比升降屬短窗，收盤後無基準）
  const tone=`今日大盤 ${sgnTxt(ix.chgP)} 點（${pctTxt(ix.chg)}）；廣度 漲${up}／跌${down}；全日成交佔比最高 ${shareTxt}，貢獻最強 ${ptsTxt}，拖累最多 ${botTxt}。`;
  const fmtP=r=>`${r.code} ${r.name} ${r.chg==null?"—":pctTxt(r.chg)} ${sgnTxt(r.pts)}`;
  OV_SUMMARY_TEXT=[`【今日總結 ${(state.live.ts||"").slice(0,10)}】`,tone,
    `貢獻前5：${top5.map(fmtP).join("、")||"—"}`,`拖累前5：${bot5.map(fmtP).join("、")||"—"}`].join("\n");
  // 每檔顯示：代號 名稱 漲跌%（紅漲綠跌）貢獻點（2026-07-21 使用者回饋）
  const fmtStk=r=>`${r.code} ${escI(r.name)} ${r.chg==null?'<span class="mut">—</span>':sgn(r.chg,pct(r.chg))} ${sgn(r.pts,sgnTxt(r.pts))}`;
  return `<div class="ovsent" id="ovSummary"><button class="seg2" data-ov-copy style="float:right;margin-left:8px">複製文字摘要</button>`+
    `<b>今日總結</b> <span class="mut" style="font-size:11px">收盤後全日口徑 · 曲線：${srcNote}</span>`+
    `<div style="margin-top:4px">${tone}</div>`+
    `<div class="ovsumgrid">`+
    `<div><div class="mut" style="font-size:11px">加權指數走勢</div>${idxSpark||`<span class="mut" style="font-size:11px">序列不足</span>`}</div>`+
    `<div><div class="mut" style="font-size:11px">資金速率（億/分）</div>${rateSpark||`<span class="mut" style="font-size:11px">序列不足</span>`}</div>`+
    `</div>`+
    `<div style="margin-top:4px;font-size:12px">貢獻前5：${top5.map(fmtStk).join("、")||"—"}`+
    `<br>拖累前5：${bot5.map(fmtStk).join("、")||"—"}</div></div>`;
}
function ovCopySummary(){
  const txt=OV_SUMMARY_TEXT||"";
  if(!txt){ovToast("尚無摘要可複製");return;}
  const done=()=>ovToast("已複製今日總結");
  const fallback=()=>{   // clipboard API 不可用（http/權限）→ textarea+execCommand，再不行請手動選取
    try{
      const ta=document.createElement("textarea");ta.value=txt;
      ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);
      ta.focus();ta.select();
      const ok=document.execCommand&&document.execCommand("copy");ta.remove();
      ok?done():ovToast("複製失敗：請手動選取總結文字");
    }catch(e){ovToast("複製失敗：請手動選取總結文字");}
  };
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(txt).then(done).catch(fallback);
  else fallback();
}

function render(){
  for(const k in T)delete T[k];
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===state.tab));
  // 美股 tab：隱藏加權/櫃買卡（其它 tab 照舊），主區改盤勢分析+速覽
  document.getElementById("mkcard").style.display=(state.tab==="us"||state.tab==="ov")?"none":"";
  if(state.tab==="us"){renderUS();return;}
  // 摘要分析：未載入 live 也要能顯示 key 輸入 UI（比照 aetf 的安全通過方式）
  if(state.tab==="insight"){if(state.live&&state.cl)renderMarket();renderInsight();return;}
  if(state.tab==="aetf"){if(state.live&&state.cl)renderMarket();renderAETF();return;}
  if(state.tab==="ov"){if(!state.live||!state.cl){document.getElementById("main").innerHTML='<div class="loading">載入中…</div>';return;}renderOverview();return;}
  if(!state.live||!state.cl){document.getElementById("main").innerHTML='<div class="loading">載入中…</div>';return;}
  renderMarket();
  if(state.pool)return renderPool();
  if(state.tab==="flow"||state.tab==="outflow")return renderFlow();
  if(state.tab==="rank")return renderRank();
  const open=state.sub[state.tab].open;
  const list=(state.live[state.tab]||[]).map(s=>{const o={sector:s.sector,...s[state.idx]};
      o.name=`<span class="sl ${open===s.sector?'sel':''}" data-sec="${encodeURIComponent(s.sector)}">${s.sector}</span>`;return o;})
    .filter(r=>r.n>0).sort((a,b)=>b.amt_yi-a.amt_yi);
  let html="";
  if(state.tab==="chain"){const c=state.live.chain_coverage||{};
    html+=`<div class="note">產業鏈為<b>多對多</b>（一檔可屬多類）：各類加總會重疊、非市佔，代表主題曝險；不含指數/部分標的（涵蓋 ${c.with_chain||"—"}/${c.total||"—"} 檔）。點類股看次產業→成分股。</div>`;
  }else html+=`<div class="note">交易所產業別（互斥）。淨流入＝漲家額−跌家額；貢獻點＝個股依市值權重對指數的漲跌點，類股加總＝指數漲跌點。點類股看成分股。</div>`;
  html+=idxSeg();
  html+=tbl(aggCols("類股"),list);
  if(open){
    if(state.tab==="exchange"){
      const codes=Object.keys(state.cl).filter(c=>state.cl[c].e===open);
      const rows=stockRows(codes), agg=list.find(r=>r.sector===open);
      html+=`<div id="dd"${/ETF/.test(open)?' class="wrap2"':''}><div class="crumb"><b>${open}</b> 成分股（${rows.length}，再點類股收合）</div>`+tbl(stockCols(),rows,agg?sumRow(agg,open):null)+`</div>`;
    }else html+=`<div id="dd">`+chainSub(open, list.find(r=>r.sector===open))+`</div>`;
  }
  document.getElementById("main").innerHTML=html;
  if(open){const boxes=[...document.querySelectorAll("#main .scrollbox")];
    if(boxes.length>1)boxes.slice(0,-1).forEach(b=>b.style.maxHeight="34vh");
    const dd=document.getElementById("dd");if(dd)dd.scrollIntoView({behavior:"smooth",block:"start"});}
}
function chainSub(ind,indAgg){
  const opensub=state.sub.chain.opensub, agg={}, want=state.idx==="tse"?"twse":"tpex";
  for(const c in state.cl){const info=state.cl[c];if(!info.c.includes(ind)||info.t!==want)continue;const v=sval(c);if(!v)continue;
    const subs=[...new Set(info.p.filter(p=>p[0]===ind).map(p=>p[1]))];
    for(const s of subs){const o=agg[s]||(agg[s]={sub:s,amt:0,lw:0,wchg:0,up:0,down:0,n:0,pts:0});
      const a=v.amt;o.amt+=a;o.lw+=(v.lw||0);o.wchg+=v.chg*a;o.n++;o.pts+=v.pts;
      if(v.chg>0)o.up++;else if(v.chg<0)o.down++;}}
  const subs=Object.values(agg).map(o=>({sub:o.sub,amt_yi:o.amt/1e8,lw_amt_yi:o.lw/1e8,
    avg_chg:o.amt?o.wchg/o.amt:0,up:o.up,down:o.down,n:o.n,pts:o.pts,
    name:`<span class="sl ${opensub===o.sub?'sel':''}" data-sub="${encodeURIComponent(o.sub)}">${cleanSub(o.sub)}</span>`}))
    .filter(o=>o.amt_yi>0).sort((a,b)=>b.amt_yi-a.amt_yi);
  let html=`<div class="crumb"><b>${ind}</b> · ${subs.length} 次產業（點看成分股；再點類股收合）</div>`+tbl(aggCols("次產業"),subs,indAgg?{...indAgg,name:`<b>${ind} 合計</b>`}:null);
  if(opensub){const codes=Object.keys(state.cl).filter(c=>state.cl[c].p.some(p=>p[0]===ind&&p[1]===opensub));
    const rows=stockRows(codes), sa=subs.find(s=>s.sub===opensub);
    html+=`<div id="dd2"><div class="crumb">${ind} › <b>${cleanSub(opensub)}</b> 成分股（${rows.length}）</div>`+tbl(stockCols(),rows,sa?sumRow(sa,cleanSub(opensub)):null)+`</div>`;}
  return html;
}
document.addEventListener("click",e=>{const el=e.target.closest("[data-pool]");if(!el)return;const a=el.dataset.pool.split(":");state.pool={mkt:a[0],kind:a[1]};render();});
document.addEventListener("click",e=>{const b=e.target.closest("[data-idx]");if(!b)return;state.idx=b.dataset.idx;state.pool=null;render();});
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{state.tab=t.dataset.tab;state.pool=null;render();});

// ---- data load / refresh ----
async function loadJSON(u){return (await fetch(u,{cache:"no-store"})).json();}
async function boot(){
  try{state.cl=(await loadJSON("data/classify.json")).map;}catch(e){document.getElementById("main").innerHTML='<div class="loading">無法載入 classify.json：'+e+'</div>';return;}
  await pull(false);
  if(!state.live){await new Promise(s=>setTimeout(s,6000));await pull(false);}  // 首拉失敗重試一次，避免卡「載入中」
  initAuto();
}
// 抓一次即時資料並重繪；manual=true 時在按鈕顯示狀態。in-flight 防重疊（慢回應時自動刷新不疊發）
let pulling=false;
async function pull(manual){
  if(pulling)return; pulling=true;
  const btn=document.getElementById("refresh");let old;
  if(manual){old=btn.textContent;btn.textContent="⏳…";btn.disabled=true;}
  try{
    if(state.tab==="us"&&manual){state.us=null;state.morning=null;uswCache=null;}   // 晨報 tab 手動更新 → 重抓全部
    if(state.tab==="aetf"&&manual)state.aetf=null;               // 主動ETF tab 手動更新 → 重抓快照+diff
    const j=await loadJSON(liveURL());
    // 第五期：回放中暫停自動重繪（state.live 照更新，「回到即時」立即接上最新盤面）
    if(j&&j.ts){state.live=j;if(!(OV_REPLAY&&state.tab==="ov"))render();}
    else if(state.tab==="us")render();
  }catch(e){ if(manual)alert("更新失敗："+(e.message||e)); }
  finally{ pulling=false; if(manual){btn.textContent=old;btn.disabled=false;} }
}
// ---- 自動刷新 ----
let autoTimer=null;
function setAuto(on){
  const b=document.getElementById("auto");
  if(on){ b.classList.add("on"); localStorage.setItem("tflive2_auto","1");
    autoTimer=setInterval(()=>pull(false), CFG.autoSec*1000); }
  else{ b.classList.remove("on"); localStorage.removeItem("tflive2_auto");
    if(autoTimer){clearInterval(autoTimer);autoTimer=null;} }
  if(state.live)renderMarket();  // 更新時間列的 ⏱自動 標記
}
function initAuto(){
  const b=document.getElementById("auto");
  b.title=`每 ${CFG.autoSec} 秒自動更新`+(CFG.worker?"":"（未設 Worker：僅本機/靜態）");
  b.onclick=()=>setAuto(!autoTimer);
  if(localStorage.getItem("tflive2_auto")) setAuto(true);
}
document.getElementById("refresh").onclick=()=>pull(true);
boot();
</script>
