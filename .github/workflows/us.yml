name: us
# 台股開盤前「昨夜美股速覽」：美股收盤(台北凌晨4/5點)後產 data/us.json，目標 08:00 台北前完成。
# 21:00 UTC 週日~四 = 05:00 台北 週一~五（cron 常延遲 ~70 分鐘 → 約 06:10 起跑，重試最多 2 小時等 FinMind 入庫）。
on:
  schedule:
    - cron: '0 21 * * 0-4'
  workflow_dispatch:

permissions:
  contents: write
  actions: write   # 提交後 dispatch pages 部署

concurrency:
  group: us
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      # FinMind 美股日線在收盤後逐檔滾動入庫（07-07 實測：06:46 全無、07:36 部分仍舊）。
      # 日期未推進、或 >1/3 檔仍是舊日期 → 等 10 分鐘重跑，最多 12 次（07-07 實測 07:36 仍有 9/24 檔未入庫）；
      # 美國休市日（日期本來就不會推進）重試耗盡後照常輸出。
      - name: build us.json（等 FinMind 入庫）
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          prev=$(python -c "import json;print(json.load(open('data/us.json')).get('date') or '')" 2>/dev/null || echo '')
          for i in $(seq 1 12); do
            python src/build_us.py
            new=$(python -c "import json;print(json.load(open('data/us.json')).get('date') or '')")
            fresh=$(python -c "import json;d=json.load(open('data/us.json'));rows=[r for g in d['groups'] for r in g['rows']];stale=sum(1 for r in rows if r.get('d') and r['d']<(d.get('date') or ''));print('yes' if rows and stale*3<=len(rows) else 'no')")
            if [ "$new" != "$prev" ] && [ "$fresh" = "yes" ]; then echo "資料已齊：$prev → $new"; break; fi
            if [ $i -lt 12 ]; then echo "US 資料未齊（date=$new fresh=$fresh），10 分鐘後重試 $i/12"; sleep 600; fi
          done
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/us.json
          if git diff --cached --quiet; then echo "no change"; exit 0; fi
          git commit -m "us $(date -u +%FT%TZ)"
          for i in 1 2 3 4 5; do git pull --rebase origin main && git push && break || sleep 4; done
          # GITHUB_TOKEN 的 push 不會觸發 pages.yml（GitHub 防遞迴），需主動 dispatch 才會部署到網站
          gh workflow run pages.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
