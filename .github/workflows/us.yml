name: us
# 台股開盤前「昨夜美股速覽」：美股收盤(台北凌晨4/5點)後產 data/us.json，目標 08:00 台北前完成。
# 主觸發＝Worker 05:05 台北（2026-07-22 翻轉；generated_at 非今日即 dispatch，重試最多 2 小時等 FinMind 入庫）。
# 本 cron 為備援 06:10 台北。
on:
  schedule:
    - cron: '10 22 * * 0-4'   # 週日~四 22:10 UTC = 06:10 台北（備援；主觸發＝Worker 05:05 新鮮度檢查 dispatch，2026-07-22 翻轉。Worker 故障日此班 +延遲仍趕 08:00 前，us 為最緊班、壓線已知）
  workflow_dispatch:

permissions:
  contents: write
  actions: write   # 提交後 dispatch pages 部署

concurrency:
  group: us
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      # FinMind 美股日線收盤後逐檔滾動入庫（07-07 實測：06:46 全無、07:36 指數/權值先到、~08:25 全齊）。
      # 策略：每 10 分鐘重跑、內容有變就即刻提交＋部署（分批上站，指數/ADR 先到先見），
      # 直到日期推進且舊檔 ≤1/3 才算齊；美國休市日（日期不會推進）重試耗盡後結束。
      - name: build us.json（等 FinMind 入庫，分批上站）
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          push_now() {
            git add data/us.json
            if git diff --cached --quiet; then echo "no change"; return 0; fi
            git commit -m "us $(date -u +%FT%TZ)"
            pushed=0
            for k in 1 2 3 4 5; do
              if git pull --rebase origin main && git push; then pushed=1; break; fi
              sleep 4
            done
            if [ "$pushed" != "1" ]; then echo "::warning::push failed after 5 retries（下一輪 10 分鐘後會再試）"; return 1; fi
            # GITHUB_TOKEN 的 push 不會觸發 pages.yml（GitHub 防遞迴），需主動 dispatch 才會部署到網站
            gh workflow run pages.yml --ref main || true
          }
          prev=$(python -c "import json;print(json.load(open('data/us.json')).get('date') or '')" 2>/dev/null || echo '')
          for i in $(seq 1 12); do
            python src/build_us.py
            new=$(python -c "import json;print(json.load(open('data/us.json')).get('date') or '')")
            fresh=$(python -c "import json;d=json.load(open('data/us.json'));rows=[r for g in d['groups'] for r in g['rows']];stale=sum(1 for r in rows if r.get('d') and r['d']<(d.get('date') or ''));print('yes' if rows and stale*3<=len(rows) else 'no')")
            push_now
            if [ "$new" != "$prev" ] && [ "$fresh" = "yes" ]; then echo "資料已齊：$prev → $new"; break; fi
            if [ $i -lt 12 ]; then echo "US 資料未齊（date=$new fresh=$fresh），10 分鐘後重試 $i/12"; sleep 600; fi
          done
