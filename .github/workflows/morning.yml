name: morning
# 台股晨報：美股(us.yml 06:00)之後、開盤前 06:20 台北 產 data/morning.json。
# 22:20 UTC 週日~四 = 06:20 台北 週一~五。
on:
  schedule:
    - cron: '20 22 * * 0-4'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: morning
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: build morning.json
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python src/build_morning.py
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/morning.json
          if git diff --cached --quiet; then echo "no change"; exit 0; fi
          git commit -m "morning $(date -u +%FT%TZ)"
          for i in 1 2 3 4 5; do git pull --rebase origin main && git push && break || sleep 4; done
