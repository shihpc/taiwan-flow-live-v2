name: morning
# 台股晨報：美股(us.yml 05:40)之後、開盤前 06:00 台北 產 data/morning.json。
# 22:00 UTC 週日~四 = 06:00 台北 週一~五（cron 常延遲 ~70 分鐘，實際約 07:10）。
on:
  schedule:
    - cron: '0 22 * * 0-4'
  workflow_dispatch:

permissions:
  contents: write
  actions: write   # 提交後 dispatch pages 部署

concurrency:
  group: morning
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: build morning.json
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python src/build_morning.py
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/morning.json
          if git diff --cached --quiet; then echo "no change"; exit 0; fi
          git commit -m "morning $(date -u +%FT%TZ)"
          pushed=0
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then pushed=1; break; fi
            sleep 4
          done
          if [ "$pushed" != "1" ]; then echo "::error::push failed after 5 retries"; exit 1; fi
          # GITHUB_TOKEN 的 push 不會觸發 pages.yml（GitHub 防遞迴），需主動 dispatch 才會部署到網站
          gh workflow run pages.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
