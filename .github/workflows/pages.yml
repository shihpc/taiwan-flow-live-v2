name: pages
# 以 GitHub Actions 部署 Pages（取代 legacy Jekyll builder，後者對本 repo 一直 errored）
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # 連續 push 改「排隊」不取消：cancel-in-progress 會在 upload 後取消舊 run，
  # 殘留的 artifact 讓後續 deploy-pages 撞 "Multiple artifacts named github-pages"（2026-07-02 連炸 #17-#25）
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
          name: pages-${{ github.run_id }}   # 每 run 唯一名，杜絕同名 artifact 衝突
      # Pages 後端偶發 "Deployment failed, try again later"（07-05/07-06 多次），失敗等 30 秒重試一次
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
        with:
          artifact_name: pages-${{ github.run_id }}
      - if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          artifact_name: pages-${{ github.run_id }}
