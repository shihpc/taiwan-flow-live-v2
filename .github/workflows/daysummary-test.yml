name: daysummary-test
# 第八期驗收用臨時 workflow：本機無 gh CLI/瀏覽器登入可 dispatch，
# 以 push 觸發（僅限本檔路徑）在 Actions 實跑 build_daysummary.py --date 2026-07-17
# 驗「產出落地＋commit」全流程。驗收完成即刪除本檔（刪除的 push 不會再觸發）。
on:
  push:
    paths:
      - '.github/workflows/daysummary-test.yml'

permissions:
  contents: write

concurrency:
  group: daysummary
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: build daysummary (2026-07-17)
        run: python src/build_daysummary.py --date 2026-07-17
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -d data/daysummary ]; then echo "no data/daysummary（優雅退出）"; exit 0; fi
          git add data/daysummary/
          if git diff --cached --quiet; then echo "no change"; exit 0; fi
          git commit -m "daysummary $(date -u +%FT%TZ)"
          pushed=0
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then pushed=1; break; fi
            sleep 4
          done
          if [ "$pushed" != "1" ]; then echo "::error::push failed after 5 retries"; exit 1; fi
