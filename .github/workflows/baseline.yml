name: baseline
# 每交易日收盤後重建 data/baseline.json（5日均額 + 投信/外資近3日買超日數）。
# 三大法人買賣超官方 20:00 台北更新 → 主觸發＝Worker 20:05 台北（2026-07-22 翻轉；
# build_baseline.py 另有 freshness 重試，法人資料未入庫時每 10 分重試最多 40 分，
# 扛官方落地抖動）。本 cron 為備援 21:15 台北。
# Worker 從 repo raw 抓此檔當「資金湧入」偵測的常態基準。
on:
  schedule:
    - cron: '15 13 * * 1-5'   # 週一~五 13:15 UTC = 21:15 台北（備援；主觸發＝Worker 20:05 新鮮度檢查 dispatch，2026-07-22 翻轉）
  workflow_dispatch:

permissions:
  contents: write
  actions: write   # 提交後 dispatch pages 部署

concurrency:
  group: baseline
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: build baseline.json
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python src/build_baseline.py
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/baseline.json
          if git diff --cached --quiet; then echo "no change"; exit 0; fi
          git commit -m "baseline $(date -u +%FT%TZ)"
          pushed=0
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then pushed=1; break; fi
            sleep 4
          done
          if [ "$pushed" != "1" ]; then echo "::error::push failed after 5 retries"; exit 1; fi
          # GITHUB_TOKEN 的 push 不會觸發 pages.yml（GitHub 防遞迴），需主動 dispatch 才會部署到網站
          gh workflow run pages.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
