name: baseline
# 每交易日收盤後重建 data/baseline.json（5日均額 + 投信/外資近3日買超日數）。
# 法人資料約 16:00-17:00 台北發布 → 排 20:30 台北（12:30 UTC）確保齊全。
# Worker 從 repo raw 抓此檔當「資金湧入」偵測的常態基準。
on:
  schedule:
    - cron: '30 12 * * 1-5'   # 週一~五 12:30 UTC = 20:30 台北
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: baseline
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: build baseline.json
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python src/build_baseline.py
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/baseline.json
          if git diff --cached --quiet; then echo "no change"; exit 0; fi
          git commit -m "baseline $(date -u +%FT%TZ)"
          for i in 1 2 3 4 5; do git pull --rebase origin main && git push && break || sleep 4; done
