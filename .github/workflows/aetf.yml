name: aetf
# 主動式ETF 每日投組快照：資料源 FinMind（2026-07-20 遷移，取代逐家投信 PCF 逆向工程）。
# 主觸發＝Worker（2026-07-22 翻轉）：一段 18:35 新鮮度檢查 dispatch、二段 21:45 晚場協調班
# aetf2 無條件補抓（治部分投信 T+1 揭露）。本檔 GH cron 挪後為備援（19:05／22:15 台北）。
# 冪等：日檔以 run_date 命名，同日重跑覆蓋同一檔（不累積）；
# diff 依 src_date 去重取最新 run，故重跑不壞資料。build_aetf 與 diff 皆需 FINMIND_TOKEN。
on:
  schedule:
    - cron: '5 11 * * 1-5'    # 一段備援 19:05 台北
    - cron: '15 14 * * 1-5'   # 二段備援 22:15 台北
  workflow_dispatch:

permissions:
  contents: write
  actions: write   # 提交後 dispatch pages 部署

concurrency:
  group: aetf
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: build aetf snapshot
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python src/build_aetf.py
      - name: build active diff
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python src/build_aetf_diff.py
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/aetf/
          if git diff --cached --quiet; then echo "no change"; exit 0; fi
          git commit -m "aetf $(date -u +%FT%TZ)"
          pushed=0
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then pushed=1; break; fi
            sleep 4
          done
          if [ "$pushed" != "1" ]; then echo "::error::push failed after 5 retries"; exit 1; fi
          # GITHUB_TOKEN 的 push 不會觸發 pages.yml（GitHub 防遞迴），需主動 dispatch 才會部署到網站
          gh workflow run pages.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
