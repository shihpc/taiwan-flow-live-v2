name = "taiwan-flow-v2"
main = "src/index.js"
compatibility_date = "2024-11-01"

# 四個 cron 共用同一個 scheduled handler（依台北時間＋event.cron 分流，
# 見 src/index.js scheduledRole）：
# 1) 盤中每分鐘存「分鐘快照 frame」到 KV（資金湧入偵測的盤中序列）
#    01:00-05:59 UTC = 09:00-13:59 台北，週一~五；收盤後 frame 值不再變、冪等
#    ※ 此字串需與 src/index.js 的 FRAME_CRON 完全一致（scheduledRole 用它
#      區分 9:07-13:07 的 :07 分重疊：frame cron 醒來的照存 frame，不搶去 dispatch news）
# 2) FinMind 哨兵：09:00-14:55 UTC = 17:00-22:55 台北每 5 分，探測盤後資料落地
#    → workflow_dispatch 觸發 taiwan-flows / postmkt（雙觸發：兩 repo 的 cron 保留當備援）
#    （2026-07-14 由 19:00 提早到 17:00：官方最早訊號為法人 20:00，17-20 點多為空轉，
#      但 FinMind 偶有提早入庫，早盯當免費保險；成本每晚約多 100 個探測請求）
# 3) 新聞定點班：每天（含週末）UTC 22:07/23:07（前一日）與 00:07-14:07
#    = 台北 06:07-22:07 每小時 :07（共 17 個時點）
#    → workflow_dispatch 觸發 taiwan-stock-news build-news.yml（該 repo 保留
#    22:37 台北 GitHub cron 當備援兜底）。實際哪些時點 dispatch 由程式判斷
#    （台北 hour 6-22 且 minute==7 才觸發），cron 只負責喚醒
# 4) 晨報準點班（與 3 共用同一條 cron 的 :47 分）：台北平日 06:47
#    → workflow_dispatch 觸發本 repo morning.yml（GitHub cron 06:00 保留當備援，
#    夜盤 05:00 收盤後留 ~1.5 小時給 FinMind 入庫；晨報建置冪等、多跑無害）。
#    其他小時的 :47 喚醒一律 idle（見 scheduledRole）
# 5) 排程備援（2026-07-20）：對純靠 GitHub schedule 的每日管線準點檢查產物新鮮度、未更新則
#    workflow_dispatch 補發（治 GH 排程延遲/漏發，如 07-20 aetf 延遲 2h）。每班一條專屬 cron，
#    event.cron 命中即進 runBackup（見 src/index.js BACKUP_CRONS / backupPipelineForCron）。
#    即使與哨兵 cron 同分觸發（如 aetf 10:50 UTC），兩者各帶自己的 event.cron、互不干擾。
[triggers]
# ※ Cron Triggers 為帳戶層級額度：Free 5 條／Paid 250 條（Cloudflare 官方文件）；本帳戶已升 Paid。
#   新聞(:07)與晨報(:47)仍共用第三條、程式內分流（沿用既有設計，不因升 Paid 而拆分）。
crons = [
  "* 1-5 * * 1-5",           # 1) 盤中每分鐘 frame（09:00-13:59 台北，週一~五）
  "*/5 9-14 * * 1-5",        # 2) FinMind 哨兵（17:00-22:55 台北每 5 分）
  "7,47 0-14,22-23 * * *",   # 3) 新聞定點班(:07) / 晨報準點班(:47)，程式內分流
  "25 6 * * 1-5",            # 4) daysummary 備援（台北 14:25；GH 14:05）
  "50 10 * * 1-5",           # 5) aetf 備援（台北 18:50；GH 18:30）
  "10 13 * * 1-5",           # 6) baseline 備援（台北 21:10；GH 20:41）
  "35 14 * * 1-5",           # 7) diag 備援 postmkt（台北 22:35；GH 22:10）
  "45 14 * * 1-5",           # 8) mktbal 備援 postmkt（台北 22:45；GH 22:20）
  "30 21 * * 0-4",           # 9) us 備援（台北平日 05:30；GH 05:00，UTC dow 0-4）
]

[[kv_namespaces]]
binding = "FLOW_KV"
id = "71ed931c80b045fc80529c265e089f15"

# 靜態依賴（classify.json / lastweek.json）來源：預設讀 V2 repo 的 raw；
# repo 尚未 push 前可暫時指向 V1（classify 結構相同）：
#   https://raw.githubusercontent.com/shihpc/taiwan-flow-live/main/data
[vars]
DATA_BASE = "https://raw.githubusercontent.com/shihpc/taiwan-flow-live-v2/main/data"
LIVE_TTL = "15"   # /live 聚合結果快取秒數

# Secrets（不寫進檔）：
#   npx wrangler secret put FINMIND_TOKEN      # FinMind API token
#   npx wrangler secret put GH_DISPATCH_TOKEN  # GitHub PAT（fine-grained，
#     對 taiwan-flows + postmkt + taiwan-stock-news 三 repo 給 Actions: Read and write），
#     哨兵與新聞定點班用來 workflow_dispatch；未設時兩者整段跳過、其餘功能不受影響
